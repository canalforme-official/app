<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
  <!--
    Fichier unique pour les pictogrammes planning (CanalForme).
    xmlns="http://www.w3.org/2000/svg" = espace de noms XML officiel SVG (W3C), obligatoire pour un SVG valide.
    Ce n'est pas une URL a ouvrir dans le navigateur ; c'est l'identifiant du standard SVG.
    Usage HTML : <svg width="16" height="16"><use href="svg/planning-icons.svg#moon-maghrib"/></svg>
    Types cours (Femmes / Hommes / Mixte) : #course-type-femmes, #course-type-hommes, #course-type-mixte
    Separateur Ramadan (barre horaires) : meme graphisme en data URI dans daily.html (fiable en background-image).
  -->
  <defs>
    <symbol id="moon-maghrib" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
    </symbol>
    <!-- Types cours : silhouettes pleines (aligné weekly_coach_panels courseTypeSvgMarkup) -->
    <symbol id="course-type-femmes" viewBox="0 0 24 24">
      <g fill="currentColor">
        <circle cx="12" cy="6" r="3.3"/>
        <path d="M12 10.6L6 21h12L12 10.6z"/>
      </g>
    </symbol>
    <symbol id="course-type-hommes" viewBox="0 0 24 24">
      <g fill="currentColor">
        <circle cx="12" cy="5.8" r="3.3"/>
        <path d="M8.6 10.2h6.8a1.3 1.3 0 011.3 1.3V21h-2.9v-6.5h-2.6V21H7.3V11.5a1.3 1.3 0 011.3-1.3z"/>
      </g>
    </symbol>
    <symbol id="course-type-mixte" viewBox="0 0 24 24">
      <g fill="currentColor">
        <circle cx="7.6" cy="7" r="2.55"/>
        <path d="M7.6 10.2L4.2 19.2h6.8L7.6 10.2z"/>
        <circle cx="16.4" cy="7" r="2.55"/>
        <path d="M13.5 10.35h5.8a1.05 1.05 0 011.05 1.05V19.2h-2.1v-4.8h-1.7v4.8h-2.1v-7.05a1.05 1.05 0 011.05-1.05z"/>
      </g>
    </symbol>
    <symbol id="sunset-ramadan" viewBox="0 0 24 24">
      <g fill="none" stroke="#26462d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 18C8 15.7909 9.79086 14 12 14C14.2091 14 16 15.7909 16 18"/>
        <line x1="21" y1="21" x2="3" y2="21"/>
        <line x1="12" y1="11" x2="12" y2="9"/>
        <path d="M12 11L12 3"/>
        <path d="M12 11L15 8.5"/>
        <path d="M12 11L9 8.5"/>
        <line x1="5" y1="18" x2="3" y2="18"/>
        <line x1="21" y1="18" x2="19" y2="18"/>
        <line x1="19.071" y1="11.3432" x2="17.6568" y2="12.7574"/>
        <line x1="5.41421" y1="12" x2="6.82843" y2="13.4142"/>
      </g>
    </symbol>
  </defs>
</svg>
