<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Planning Hebdomadaire</title>

  <!-- Favicon -->
  <link rel="icon" href="https://mcusercontent.com/74abea872abd45d46efed5d41/images/a4d5232f-9127-e32c-00fe-10dc007e956e.png" type="image/png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Styles généraux */
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    /* Style pour la disposition du titre et des filtres */
    .header-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .header-wrapper h1 {
      color: #333;
      font-size: 1.8em;
      margin: 0;
    }

    /* Styles pour le conteneur des filtres */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filters label {
      font-size: 0.9em;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .filters input[type="checkbox"] {
      margin-right: 5px;
    }

    /* Overlay de chargement */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      flex-direction: column;
    }

    /* Style du message de chargement */
    #loadingMessage {
      margin-top: 50px;
      font-size: 1.5em;
      color: #fff;
      text-align: center;
      width: 80%;
      max-width: 600px;
      background-color: rgba(255, 255, 255, 0.2);
      padding: 10px;
      border-radius: 10px;
    }

    /* Logo animé lors du chargement */
    .loading-logo {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loading-logo img {
      width: 50px;
      height: 50px;
      animation: zoom-logo 1.5s ease-in-out infinite;
    }

    @keyframes zoom-logo {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.5);
      }
      100% {
        transform: scale(1);
      }
    }

    /* Style pour le bouton de retour à la vue quotidienne */
    .today-view-button {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background-color: rgba(255, 255, 255, 0.8);
      padding: 8px;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .today-view-button a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }

    .today-view-button img {
      width: 30px;
      height: 30px;
      cursor: pointer;
    }

    /* Animation au survol */
    .today-view-button:hover {
      background-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.4);
    }

    /* Styles pour le tableau du planning hebdomadaire */
    .weekly-schedule {
      width: 100%;
      border-collapse: collapse;
      margin: 0 auto;
      table-layout: fixed; /* Assure une largeur égale des colonnes */
    }

    .weekly-schedule th, .weekly-schedule td {
      padding: 5px; /* Réduction du padding */
      vertical-align: top;
      border: none;
    }

    /* Ligne des titres avec fond rouge moins transparent et texte blanc */
    .weekly-schedule thead th {
      background-color: rgba(255, 0, 0, 0.3); /* Augmente l'opacité du fond */
      color: white; /* Texte en blanc */
      text-align: center;
      font-size: 1.2em;
      border-bottom: 2px solid #ccc;
      position: relative;
    }

    /* Animation améliorée pour le jour actuel */
    .weekly-schedule thead th.today {
      animation: pulse 1.5s infinite;
      color: yellow; /* Changement de la couleur du texte pour le jour actuel */
    }

    /* Keyframes ajustés pour une animation plus prononcée */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Styles pour la cellule des heures */
    .weekly-schedule th:first-child,
    .weekly-schedule td.time-cell {
      width: 50px;
      min-width: 20px;
      max-width: 60px;
      text-align: center;
      padding: 5px;
    }

    /* Alternance de couleurs pour les time-cell */
    .weekly-schedule td.time-cell-white {
      background-color: white;
      color: black;
      text-align: center;
    }

    .weekly-schedule td.time-cell-grey {
      background-color: #f0f0f0;
      color: black;
      text-align: center;
    }

    /* Ajustement des cellules des cours */
    .course-cell {
      min-width: 100px;
      text-align: center;
      border-bottom: 1px solid #eee;
      position: relative;
      padding: 5px; /* Réduction du padding */
    }

    /* Ajustement des blocs de cours */
    .course-block {
      margin-bottom: 5px; /* Réduction de l'espace entre les blocs */
      border-radius: 10px;
      border: 1px solid #ccc;
      background-color: #ffffff; /* Fond blanc pour les cours mixtes */
      position: relative;
      overflow: visible;
      transition: transform 0.3s;
      z-index: 1; /* Assure que le bloc est sous le cercle de compte à rebours */
    }

    /* Effet de rebond pour les cours commençant dans moins de 15 minutes */
    .course-block.starting-soon {
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Styles pour le cercle du compte à rebours */
    .countdown-circle {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 20px; /* Taille réduite du cercle */
      height: 20px;
      background-color: red;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6em; /* Taille du texte conservée */
      font-weight: bold;
      z-index: 5; /* Assure que le cercle est au-dessus de tout */
    }

    /* Styles pour les cours "100% Femmes" */
    .course-block.women-only {
      background-color: #FFF0F5;
      border: 1px solid #FF69B4;
    }

    /* Styles pour les cours "Piscine" */
    .course-block.piscine {
      background-color: #E0F7FF;
      border: 1px solid #1E90FF;
    }

    /* Styles spécifiques pour les logos de cours */
    .logo-cours {
      max-width: 90%;
      max-height: 35px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    /* Styles pour les lignes blanches et grises */
    .course-row-white {
      background-color: white;
      color: black;
    }

    .course-row-grey {
      background-color: #f0f0f0;
      color: black;
    }

    /* Styles pour rendre l'en-tête sticky avec une ombre diffuse */
    .weekly-schedule thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: rgba(255, 0, 0, 0.7); /* Mettre à jour pour correspondre à la transparence du fond */
    }

    .weekly-schedule thead::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -10px;
      height: 10px;
      background: linear-gradient(to bottom,
                  rgba(0, 0, 0, 0.1) 0%,
                  rgba(0, 0, 0, 0.05) 40%,
                  rgba(0, 0, 0, 0.02) 60%,
                  rgba(0, 0, 0, 0) 100%);
      pointer-events: none;
    }

    /* Styles pour les cours */
    .course-info {
      font-size: 1em;
      font-weight: bold;
      color: #000;
      margin-bottom: 4px;
    }

    .single-coach {
      font-size: 0.8em;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-top: 1px;
    }

    .single-coach img {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .multiple-coaches {
      text-align: center;
      font-size: 0.8em;
    }

    /* Cacher les coachs si le filtre est décoché */
    .hide-coaches .single-coach,
    .hide-coaches .multiple-coaches {
      display: none;
    }

    /* Styles spécifiques pour les appareils mobiles avec rotation */
    @media screen and (max-width: 767px) {
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      body {
        transform: rotate(90deg);
        transform-origin: bottom left;
        position: absolute;
        top: -100vw;
        left: 0;
        width: 100vh;
        height: 100vw;
      }

      .content-wrapper {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 10px;
        box-sizing: border-box;
      }

      #weeklySchedule {
        width: 100%;
        height: auto;
      }

      .weekly-schedule {
        width: 100%;
        font-size: 0.7em;
        table-layout: fixed;
      }

      .weekly-schedule th,
      .weekly-schedule td {
        padding: 5px 2px;
        word-wrap: break-word;
        overflow-wrap: break-word;
        hyphens: auto;
        border: none;
        margin: 0;
      }

      /* Ajustement des largeurs de colonnes */
      .weekly-schedule .time-cell {
        width: 20px;
        writing-mode: vertical-rl;
        font-size: 0.8em;
        white-space: nowrap;
        padding: 2px;
        text-align: center;
        transform: none;
      }

      .weekly-schedule .course-cell {
        width: calc((100% - 20px) / 7);
        padding: 2px;
      }

      /* Réduction des paddings et marges */
      .weekly-schedule .course-block {
        padding: 2px;
        margin-bottom: 2px;
      }

      .weekly-schedule .course-info {
        margin-bottom: 2px;
      }

      /* Ajustement des polices */
      .weekly-schedule .course-info {
        font-size: 0.8em !important;
        white-space: normal !important;
      }

      .single-coach,
      .multiple-coaches {
        font-size: 0.7em !important;
        white-space: normal !important;
      }

      /* Ajustement de la taille du cercle de compte à rebours en rotation */
      .countdown-circle {
        width: 15px;
        height: 15px;
        font-size: 0.5em;
        top: -8px;
        right: -8px;
      }

      /* Placer le bouton de retour à la vue quotidienne en bas à droite */
      .today-view-button {
        display:flex !important;
        position: fixed !important;
        bottom: 10px !important;
        right: 10px !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
      }

      /* Styles pour les filtres en vue mobile */
      .header-wrapper {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        flex-wrap: nowrap;
      }

      .header-wrapper h1 {
        font-size: 1.5em;
        margin: 0;
        flex-shrink: 1;
      }

      .filters {
        justify-content: center;
        flex-wrap: nowrap;
        gap: 5px;
      }

      .filters label {
        font-size: 0.8em;
      }
    }
  </style>
</head>
<body onload="initializeWeeklyPage();">

  <div class="content-wrapper">

    <!-- Bouton pour revenir à la vue quotidienne -->
    <div class="today-view-button">
      <a href="./daily.html">
        <img src="https://mcusercontent.com/74abea872abd45d46efed5d41/images/87c4d60c-96fd-da4b-3996-eba4f5622ec8.png" alt="Vue Quotidienne">
      </a>
    </div>

    <!-- En-tête avec le titre et les filtres -->
    <div class="header-wrapper">
      <h1>Planning Hebdomadaire</h1>
      <div class="filters">
        <label>
          <input type="checkbox" id="filter-mixte" checked>
          Mixte
        </label>
        <label>
          <input type="checkbox" id="filter-women-only" checked>
          100% Femmes
        </label>
        <label>
          <input type="checkbox" id="filter-piscine" checked>
          Piscine
        </label>
        <label>
          <input type="checkbox" id="filter-coach" checked>
          Coach
        </label>
      </div>
    </div>

    <!-- Le planning hebdomadaire sera inséré ici -->
    <div id="weeklySchedule"></div>

  </div>

  <!-- Overlay de chargement -->
  <div id="loadingOverlay" style="display: none;">
    <div class="loading-logo">
      <img src="https://mcusercontent.com/74abea872abd45d46efed5d41/images/b2432ed3-7c9d-2bba-4c0b-ba72c2cab56a.png" alt="Logo du Club">
    </div>
    <div id="loadingMessage">Chargement du planning hebdomadaire</div>
  </div>

  <script>
    // Initialiser les variables
    var scheduleData = [];

    function initializeWeeklyPage() {
      // Afficher l'overlay de chargement
      document.getElementById('loadingOverlay').style.display = 'flex';
      document.getElementById('loadingMessage').innerHTML = 'Chargement du planning hebdomadaire';

      // Récupérer l'état des filtres depuis les paramètres d'URL
      const urlParams = new URLSearchParams(window.location.search);
      document.getElementById('filter-mixte').checked = urlParams.get('mixte') !== 'false';
      document.getElementById('filter-women-only').checked = urlParams.get('women-only') !== 'false';
      document.getElementById('filter-piscine').checked = urlParams.get('piscine') !== 'false';
      document.getElementById('filter-coach').checked = urlParams.get('coach') !== 'false';

      // Récupérer les données du backend
      fetch('https://www.googleapis.com/drive/v3/files/1Gx8yDF2DaKIEmnQHouXxe0XJ6F7KfUJu?alt=media&key=AIzaSyD_euw_yW9Yr_-xG78rcNrRnAs7YZVpnUA')
        .then(response => response.json())
        .then(data => {
          // Ignorer la première ligne (titres)
          data = data.slice(1);

          // Assigner les données à la variable scheduleData
          scheduleData = data;

          // Générer le HTML du planning hebdomadaire
          var weeklyHtml = generateWeeklyScheduleHtml();
          document.getElementById('weeklySchedule').innerHTML = weeklyHtml;

          // Cacher l'overlay de chargement
          document.getElementById('loadingOverlay').style.display = 'none';

          // Ajouter des écouteurs d'événements pour les filtres
          document.getElementById('filter-mixte').addEventListener('change', applyFilters);
          document.getElementById('filter-women-only').addEventListener('change', applyFilters);
          document.getElementById('filter-piscine').addEventListener('change', applyFilters);
          document.getElementById('filter-coach').addEventListener('change', applyFilters);

          // Appliquer les filtres initiaux
          applyFilters();

          // Scroll automatique vers l'heure actuelle
          scrollToCurrentTime();

          // Mettre à jour les cercles de compte à rebours
          updateCountdownCircles();

          // Mettre à jour les cercles chaque minute
          setInterval(updateCountdownCircles, 60000);
        })
        .catch(error => {
          console.error('Erreur lors de la récupération des données :', error);
          document.getElementById('loadingMessage').innerHTML = 'Erreur lors du chargement des données';
        });
    }

    function generateWeeklyScheduleHtml() {
      var weekDays = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];

      var todayIndex = new Date().getDay();
      var todayName = weekDays[todayIndex];

      var daysWithCourses = new Set();
      var timesWithCourses = new Set();

      var scheduleByTimeAndDay = {};

      for (var i = 0; i < scheduleData.length; i++) {
        var row = scheduleData[i];
        var courseName = row.name;
        var day = row.day;
        var startTime = row.startTime;
        var endTime = row.endTime;
        var coach = row.coach;
        var studio = row.studio;
        var type = row.type;
        var logoUrl = row.logo;
        var coachImageUrl = row.coachImage;

        if (!courseName || !day || !startTime) {
          continue;
        }

        daysWithCourses.add(day);
        timesWithCourses.add(startTime);

        if (!scheduleByTimeAndDay[startTime]) {
          scheduleByTimeAndDay[startTime] = {};
        }
        if (!scheduleByTimeAndDay[startTime][day]) {
          scheduleByTimeAndDay[startTime][day] = [];
        }

        scheduleByTimeAndDay[startTime][day].push({
          courseName: courseName,
          coach: coach ? coach.split(',') : [],
          studio: studio,
          endTime: endTime,
          type: type,
          logo: logoUrl,
          coachImage: coachImageUrl,
          startTime: startTime
        });
      }

      var daysArray = Array.from(daysWithCourses);
      var timesArray = Array.from(timesWithCourses);

      daysArray.sort(function(a, b) {
        return weekDays.indexOf(a) - weekDays.indexOf(b);
      });

      timesArray.sort();

      var html = '<table class="weekly-schedule">';

      html += '<thead><tr><th></th>';
      for (var i = 0; i < daysArray.length; i++) {
        var dayClass = '';
        if (daysArray[i] === todayName) {
          dayClass = 'today';
        }
        html += '<th class="' + dayClass + '">' + daysArray[i] + '</th>';
      }
      html += '</tr></thead>';

      html += '<tbody>';

      var isWhiteRow = true;

      for (var t = 0; t < timesArray.length; t++) {
        var time = timesArray[t];

        // Détermine la classe pour la couleur de la ligne (blanche ou grise)
        var rowClass = isWhiteRow ? 'course-row-white' : 'course-row-grey';
        var timeCellClass = isWhiteRow ? 'time-cell-white' : 'time-cell-grey';

        isWhiteRow = !isWhiteRow;

        html += '<tr class="' + rowClass + '">';

        html += '<td class="time-cell ' + timeCellClass + '">' + time + '</td>';

        for (var d = 0; d < daysArray.length; d++) {
          var day = daysArray[d];
          var courses = scheduleByTimeAndDay[time][day];

          html += '<td class="course-cell">';
          if (courses && courses.length > 0) {
            for (var c = 0; c < courses.length; c++) {
              var course = courses[c];
              var courseDisplay = '';

              var logoUrl = course.logo || '';
              var courseNameDisplay = '';

              // Affichage selon la présence du logo
              if (logoUrl) {
                courseNameDisplay = '<img class="logo-cours" src="' + logoUrl + '" alt="' + course.courseName + ' Logo">';
              } else {
                courseNameDisplay = '<div class="course-name-text">' + course.courseName + '</div>';
              }

              var coachImagesHtml = '';
              if (course.coach.length === 1) {
                var coachImageUrl = course.coachImage || 'https://mcusercontent.com/74abea872abd45d46efed5d41/images/a340beeb-f8a3-d937-7eb8-e17882fc82ec.png';
                coachImagesHtml = '<div class="single-coach">' +
                                  '<img src="' + coachImageUrl + '" alt="' + course.coach[0] + '">' +
                                  '<span>' + course.coach[0] + '</span></div>';
              } else if (course.coach.length > 1) {
                coachImagesHtml = '<div class="multiple-coaches">';
                course.coach.forEach(function(coachName) {
                  coachImagesHtml += '<span>' + coachName.trim() + '</span><br>';
                });
                coachImagesHtml += '</div>';
              }

              var courseClasses = 'course-block';
              if (course.type === '100% Femmes') {
                courseClasses += ' women-only';
              } else {
                courseClasses += ' mixte';
              }

              if (course.studio === 'Piscine') {
                courseClasses += ' piscine';
              }

              // Vérifier si le cours commence dans moins de 15 minutes
              var now = new Date();
              var courseDate = new Date();
              courseDate.setHours(parseInt(course.startTime.split(':')[0]), parseInt(course.startTime.split(':')[1]), 0, 0);
              var dayOffset = weekDays.indexOf(day) - now.getDay();
              if (dayOffset < 0) dayOffset += 7;
              courseDate.setDate(now.getDate() + dayOffset);

              var timeDifference = (courseDate - now) / 60000; // Différence en minutes

              var isStartingSoon = timeDifference >= 0 && timeDifference <= 15;

              if (isStartingSoon) {
                courseClasses += ' starting-soon';
              }

              courseDisplay += '<div class="' + courseClasses + '">';

              // Ajouter le cercle de compte à rebours si le cours commence bientôt
              if (isStartingSoon) {
                courseDisplay += '<div class="countdown-circle" data-time-diff="' + Math.floor(timeDifference) + '"></div>';
              }

              courseDisplay += '<div class="course-info">' + courseNameDisplay + '</div>';
              courseDisplay += coachImagesHtml;
              courseDisplay += '</div>';

              html += courseDisplay;
            }
          }
          html += '</td>';
        }

        html += '</tr>';
      }
      html += '</tbody>';
      html += '</table>';

      return html;
    }

    function applyFilters() {
      // Obtenir l'état des filtres
      var showMixte = document.getElementById('filter-mixte').checked;
      var showWomenOnly = document.getElementById('filter-women-only').checked;
      var showPiscine = document.getElementById('filter-piscine').checked;
      var showCoach = document.getElementById('filter-coach').checked;

      // Sélectionner tous les blocs de cours
      var courseBlocks = document.querySelectorAll('.course-block');

      courseBlocks.forEach(function(block) {
        // Obtenir les classes du bloc de cours
        var classes = block.classList;

        // Déterminer si le bloc doit être affiché ou non
        var show = true;

        if (classes.contains('mixte') && !showMixte) {
          show = false;
        }
        if (classes.contains('women-only') && !showWomenOnly) {
          show = false;
        }
        if (classes.contains('piscine') && !showPiscine) {
          show = false;
        }

        // Afficher ou masquer le bloc
        block.style.display = show ? 'block' : 'none';
      });

      // Afficher ou masquer les coachs
      var scheduleElement = document.getElementById('weeklySchedule');
      if (!showCoach) {
        scheduleElement.classList.add('hide-coaches');
      } else {
        scheduleElement.classList.remove('hide-coaches');
      }
    }

    // Fonction pour mettre à jour les cercles de compte à rebours
    function updateCountdownCircles() {
      var countdownCircles = document.querySelectorAll('.countdown-circle');

      countdownCircles.forEach(function(circle) {
        var timeDiff = parseInt(circle.getAttribute('data-time-diff'));
        if (timeDiff >= 0) {
          circle.textContent = timeDiff + "'";
          circle.setAttribute('data-time-diff', timeDiff - 1);
        } else {
          // Retirer le cercle si le temps est écoulé
          circle.parentElement.classList.remove('starting-soon');
          circle.remove();
        }
      });
    }

    // Fonction pour scroller automatiquement vers l'heure actuelle
    function scrollToCurrentTime() {
      var now = new Date();
      var currentHour = now.getHours();
      var currentMinutes = now.getMinutes();

      var times = document.querySelectorAll('.time-cell');

      var targetRow = null;

      for (var i = 0; i < times.length; i++) {
        var timeText = times[i].textContent;
        var [hour, minute] = timeText.split(':').map(Number);

        if (hour > currentHour || (hour === currentHour && minute >= currentMinutes)) {
          targetRow = times[i].parentElement;
          break;
        }
      }

      if (targetRow) {
        targetRow.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'nearest' });
      }
    }
  </script>

</body>
</html>
