    /**
     * Remplit la barre challenge H / F à partir d'un bloc période (current ou previous).
     * @returns {boolean} false si données insuffisantes
     */
    function fillGenderChallengeBar(periodData, ids) {
      if (!periodData || !periodData.meps_averages || !periodData.active_users || !periodData.inactive_users) {
        return false;
      }
      const maleMEPs = parseFloat(periodData.meps_averages.male) || 0;
      const femaleMEPs = parseFloat(periodData.meps_averages.female) || 0;
      const totalMEPs = maleMEPs + femaleMEPs || 1;
      const maleUsers = periodData.active_users.male;
      const femaleUsers = periodData.active_users.female;
      const maleInactiveUsers = periodData.inactive_users.male;
      const femaleInactiveUsers = periodData.inactive_users.female;

      const maleTotalUsers = maleUsers + maleInactiveUsers;
      const femaleTotalUsers = femaleUsers + femaleInactiveUsers;

      const malePercentage = (maleMEPs / totalMEPs) * 100 || 50;

      const maleBar = document.getElementById(ids.maleBarId);
      const femaleBar = document.getElementById(ids.femaleBarId);
      const menLabel = document.getElementById(ids.menLabelId);
      const womenLabel = document.getElementById(ids.womenLabelId);
      const dynamicIcon = document.getElementById(ids.dynamicIconId);
      if (!maleBar || !femaleBar || !menLabel || !womenLabel || !dynamicIcon) {
        return false;
      }

      maleBar.style.width = `${malePercentage}%`;
      femaleBar.style.width = `${100 - malePercentage}%`;

      menLabel.classList.remove('winner');
      womenLabel.classList.remove('winner');
      maleBar.classList.remove('winner');
      femaleBar.classList.remove('winner');

      if (maleMEPs > femaleMEPs) {
        menLabel.classList.add('winner');
        maleBar.classList.add('winner');
      } else if (femaleMEPs > maleMEPs) {
        womenLabel.classList.add('winner');
        femaleBar.classList.add('winner');
      } else {
        if (malePercentage >= 50) {
          maleBar.classList.add('winner');
        } else {
          femaleBar.classList.add('winner');
        }
      }

      const maleLabel = maleUsers === 1 ? 'Actif' : 'Actifs';
      const femaleLabel = femaleUsers === 1 ? 'Active' : 'Actives';

      const trophyWinner = `<span class="trophy-svg trophy-svg--winner" aria-hidden="true">${CHALLENGE_TROPHY_SVG}</span>`;

      menLabel.innerHTML = `👨 ${maleUsers} ${maleLabel} / ${maleTotalUsers}` + (menLabel.classList.contains('winner') ? trophyWinner : '');
      womenLabel.innerHTML = (womenLabel.classList.contains('winner') ? trophyWinner : '') + `👩 ${femaleUsers} ${femaleLabel} / ${femaleTotalUsers}`;

      const formatMEPs = (n) => Math.round(n).toLocaleString('fr-FR', { useGrouping: true, maximumFractionDigits: 0 });
      maleBar.innerHTML = `<strong><span class="challenge-meps-number">${formatMEPs(maleMEPs)}</span> MEPs</strong>`;
      femaleBar.innerHTML = `<strong><span class="challenge-meps-number">${formatMEPs(femaleMEPs)}</span> MEPs</strong>`;

      let iconUrl = '';
      if (maleMEPs > femaleMEPs) {
        iconUrl = 'https://mcusercontent.com/74abea872abd45d46efed5d41/images/851e5185-0160-776f-b434-f53d347ed959.png';
      } else if (femaleMEPs > maleMEPs) {
        iconUrl = 'https://mcusercontent.com/74abea872abd45d46efed5d41/images/4119f047-9d31-2644-8a66-907481726761.png';
      } else {
        iconUrl = 'https://mcusercontent.com/74abea872abd45d46efed5d41/images/d45bac30-41fd-6f61-ce4b-8f65a4f76fd2.png';
      }

      dynamicIcon.innerHTML = `<img src="${iconUrl}" alt="">`;
      dynamicIcon.style.left = `calc(${malePercentage}% + 3px)`;
      return true;
    }

    /** Légende courte du bloc mois précédent (moyennes MEPs actifs), alignée sur la logique de la barre */
    function captionPreviousMonthWinners(periodData) {
      if (!periodData || !periodData.meps_averages) return '';
      const m = parseFloat(periodData.meps_averages.male) || 0;
      const f = parseFloat(periodData.meps_averages.female) || 0;
      if (m > f) return 'Gagnants : Les hommes';
      if (f > m) return 'Gagnants : Les femmes';
      const total = m + f || 1;
      return (m / total) * 100 >= 50 ? 'Gagnants : Les hommes' : 'Gagnants : Les femmes';
    }

    function updateMenWomenBar(data) {
      if (!data || !data.current) {
        console.warn('updateMenWomenBar: données manquantes (current)');
        return;
      }
      const ok = fillGenderChallengeBar(data.current, {
        menLabelId: 'menLabel',
        womenLabelId: 'womenLabel',
        maleBarId: 'maleBar',
        femaleBarId: 'femaleBar',
        dynamicIconId: 'dynamicIcon'
      });
      if (!ok) {
        console.warn('updateMenWomenBar: données manquantes (meps_averages / active_users / inactive_users)');
      }
    }

    /**
     * Affiche "Mise à jour en cours." avec animation des points (., .., ...) en boucle
     */
    function showUpdatingMessage() {
      stopUpdatingMessage();
      const countdownElement = document.getElementById('countdown');
      if (!countdownElement) return;
      countdownElement.classList.add('updating');
      const dots = ['.', '..', '...'];
      let i = 0;
      countdownElement.textContent = 'Mise à jour en cours' + dots[0];
      updatingDotsInterval = setInterval(() => {
        i = (i + 1) % 3;
        countdownElement.textContent = 'Mise à jour en cours' + dots[i];
      }, UPDATING_DOTS_MS);
    }

    /**
     * Arrête le message "Mise à jour en cours" et l'animation des points
     */
    function stopUpdatingMessage() {
      if (updatingDotsInterval) {
        clearInterval(updatingDotsInterval);
        updatingDotsInterval = null;
      }
      if (updatingRetryTimeout) {
        clearTimeout(updatingRetryTimeout);
        updatingRetryTimeout = null;
      }
      const countdownElement = document.getElementById('countdown');
      if (countdownElement) countdownElement.classList.remove('updating');
    }

    /**
     * Démarre le compte à rebours pour la mise à jour
     * @param {number} duration Durée en secondes
     */
    function startCountdown(duration) {
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
      stopUpdatingMessage();

      let timer = duration;
      const countdownElement = document.getElementById('countdown');

      function updateCountdown() {
        let minutes = Math.floor(timer / 60);
        let seconds = timer % 60;

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        countdownElement.textContent = "Prochaine mise à jour dans : " + minutes + ":" + seconds;

        if (--timer < 0) {
          clearInterval(countdownInterval);
          showUpdatingMessage();
          loadLeaderboard();
        }
      }

      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    /**
     * Ajoute quelques confettis (chute en continu, plus aléatoire qu'en rafales)
     */
    function spawnPreviousPodiumConfetti() {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const container = document.getElementById('previousPodiumConfetti');
      if (!container) return;
      /* Même palette que les podiums 1er / 2e / 3e (or, argent, bronze) — pas de bleu */
      const colors = [
        '#FFD700', '#FFC600', '#FFB700', '#FFA700',
        '#C0C0C0', '#B0B0B0', '#A0A0A0', '#909090',
        '#CD7F32', '#B87333', '#A66A2E', '#965A2B',
        '#ffffff', '#fff8dc'
      ];
      const count = 14 + Math.floor(Math.random() * 28);
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece' + (Math.random() > 0.35 ? ' sparkle' : '');
        piece.style.left = Math.random() * 100 + '%';
        piece.style.animationDelay = (Math.random() * 0.35) + 's';
        piece.style.animationDuration = (1.8 + Math.random() * 0.95) + 's';
        const drift = (Math.random() - 0.5) * 140;
        const rot = 360 + Math.random() * 720;
        piece.style.setProperty('--dx', drift + 'px');
        piece.style.setProperty('--rot', rot + 'deg');
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.color = piece.style.backgroundColor;
        container.appendChild(piece);
        setTimeout(function () {
          if (piece.parentNode) piece.remove();
        }, 3200);
      }
    }

    function scheduleNextConfetti() {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      previousPodiumConfettiTimeout = setTimeout(function () {
        spawnPreviousPodiumConfetti();
        scheduleNextConfetti();
      }, 100 + Math.random() * 380);
    }

    function startPreviousPodiumConfetti() {
      stopPreviousPodiumConfetti();
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const container = document.getElementById('previousPodiumConfetti');
      if (!container) return;
      container.innerHTML = '';
      spawnPreviousPodiumConfetti();
      scheduleNextConfetti();
    }

    function stopPreviousPodiumConfetti() {
      if (previousPodiumConfettiInterval) {
        clearInterval(previousPodiumConfettiInterval);
        previousPodiumConfettiInterval = null;
      }
      if (previousPodiumConfettiTimeout) {
        clearTimeout(previousPodiumConfettiTimeout);
        previousPodiumConfettiTimeout = null;
      }
      const container = document.getElementById('previousPodiumConfetti');
      if (container) container.innerHTML = '';
    }

    /**
     * Met à jour le leaderboard avec les nouvelles données
     * @param {Object} data Données du leaderboard
     */
    function updateLeaderboard(data) {
      console.log('Données reçues:', data);
      const today = new Date();
      const dayOfMonth = today.getDate();

      // Challenge homme/femme : affiché uniquement s'il y a un classement (entraînements) pour le mois en cours
      const hasRanking = data.current && data.current.data && data.current.data.length > 0 && !allMepsZero(data.current.data);
      document.querySelector('.competition-container').style.display = hasRanking ? 'block' : 'none';

      // Vérifie si le mois actuel doit être affiché
      if (data.current) {
        const currentMonthTitle = formatMonthTitle(data.current.month);
        document.getElementById('currentMonthTitle').textContent = currentMonthTitle;
        document.getElementById('currentMonthContainer').style.display = 'flex';
        document.getElementById('currentMonthTitle').style.display = 'block';
        document.querySelector('.current-month-block').style.display = 'block';

        if (hasRanking) {
          console.log('Données du mois actuel:', data.current.data);
          document.getElementById('currentMonthEmptyState').style.display = 'none';
          document.getElementById('currentMonthLeaderboard').style.display = 'block';
          document.getElementById('podiumWrapper').style.display = 'flex';

          // Comparaison avec le dernier classement affiché (entre deux mises à jour du même mois)
          const rankChangeMap = {};
          data.current.data.forEach(function (user) {
            const guid = user.usrGUID;
            const newPos = user.position;
            const oldPos = lastCurrentMonthRankByGuid[guid];
            if (oldPos != null) {
              if (newPos < oldPos) rankChangeMap[guid] = 'up';
              else if (newPos > oldPos) rankChangeMap[guid] = 'down';
              else rankChangeMap[guid] = 'same';
            }
          });

          displayPodium(data.current.data.slice(0, 3), 'podiumWrapper', 'current', rankChangeMap);
          displayLeaderboard(data.current.data, 'currentMonthLeaderboard', 'current', rankChangeMap);

          lastCurrentMonthRankByGuid = {};
          data.current.data.forEach(function (u) {
            lastCurrentMonthRankByGuid[u.usrGUID] = u.position;
          });

          if (SHOW_COUNTDOWN) {
            document.getElementById('countdown').style.display = 'block';
          } else {
            document.getElementById('countdown').style.display = 'none';
          }
        } else {
          // Aucun MEP encore : afficher le message d'attente
          document.getElementById('currentMonthEmptyState').style.display = 'block';
          document.getElementById('currentMonthLeaderboard').style.display = 'none';
          document.getElementById('currentMonthLeaderboard').innerHTML = '';
          document.getElementById('podiumWrapper').style.display = 'none';
          document.getElementById('podiumWrapper').innerHTML = '';
          if (SHOW_COUNTDOWN) {
            document.getElementById('countdown').style.display = 'block';
          } else {
            document.getElementById('countdown').style.display = 'none';
          }
        }
      } else {
        console.log('Pas de données pour le mois actuel');
      }

      // Affiche le mois précédent uniquement jusqu'au 7 du mois actuel
      if (dayOfMonth <= 7 && data.previous && data.previous.data) {
        console.log('Données du mois précédent:', data.previous.data);
        const previousMonthTitle = formatMonthTitle(data.previous.month);
        document.getElementById('previousMonthTitle').textContent = previousMonthTitle;

        displayPodium(data.previous.data.slice(0, 3), 'previousPodiumWrapper', 'previous');
        displayLeaderboard(data.previous.data, 'previousMonthLeaderboard', 'previous');
        startPreviousPodiumConfetti();

        // Afficher toute la section mois précédent
        const previousSection = document.getElementById('previousMonthSection');
        if (previousSection) {
          previousSection.style.display = 'block';
          previousSection.style.visibility = '';
          previousSection.style.height = '';
          previousSection.style.overflow = '';
          previousSection.style.padding = '';
          previousSection.style.margin = '';
        }
        const previousPodiumWrap = document.getElementById('previousPodiumWithConfetti');
        const previousPodiumEl = document.getElementById('previousPodiumWrapper');
        if (previousPodiumWrap) previousPodiumWrap.style.display = 'block';
        if (previousPodiumEl) previousPodiumEl.style.display = 'flex';

        const previousElements = [
          document.getElementById('previousMonthContainer'),
          document.getElementById('previousPodiumWithConfetti'),
          document.getElementById('previousMonthTitle')
        ];
        previousElements.forEach(element => {
          if (element) {
            if (element.id === 'previousPodiumWithConfetti') element.style.display = 'block';
            else if (element.id === 'previousMonthContainer') element.style.display = 'flex';
            else if (element.id === 'previousMonthTitle') element.style.display = 'block';
            element.style.visibility = '';
            element.style.opacity = '';
            element.style.height = '';
            element.style.padding = '';
            element.style.margin = '';
            element.style.position = '';
          }
        });
        const previousMonthBlock = document.querySelector('#previousMonthContainer .month-block');
        if (previousMonthBlock) {
          previousMonthBlock.style.display = 'block';
        }

        const prevComp = document.getElementById('previousMonthCompetition');
        const prevCap = document.getElementById('previousCompetitionCaption');
        const prevOk = data.previous && fillGenderChallengeBar(data.previous, {
          menLabelId: 'prevMenLabel',
          womenLabelId: 'prevWomenLabel',
          maleBarId: 'prevMaleBar',
          femaleBarId: 'prevFemaleBar',
          dynamicIconId: 'prevDynamicIcon'
        });
        if (prevComp) {
          if (prevOk) {
            prevComp.style.display = 'block';
            if (prevCap) prevCap.textContent = captionPreviousMonthWinners(data.previous);
          } else {
            prevComp.style.display = 'none';
          }
        }
      } else if (dayOfMonth > 7) {
        stopPreviousPodiumConfetti();
        const prevCompHide = document.getElementById('previousMonthCompetition');
        if (prevCompHide) prevCompHide.style.display = 'none';
        // Masquer toute la section mois précédent (aucun résidu, plus de bloc translucide)
        const previousSection = document.getElementById('previousMonthSection');
        if (previousSection) {
          previousSection.style.display = 'none';
          previousSection.style.visibility = 'hidden';
          previousSection.style.height = '0';
          previousSection.style.overflow = 'hidden';
          previousSection.style.padding = '0';
          previousSection.style.margin = '0';
        }
      }
      /* Si dayOfMonth <= 7 mais pas de data.previous : on ne touche pas au bloc mois précédent (évite disparition pendant la mise à jour) */

      previousData = data;
    }

    /**
     * Formate le titre du mois en fonction de la première lettre
     * @param {string} month Nom du mois
     * @returns {string} Titre formaté
     */
    function formatMonthTitle(month) {
      const vowels = ['A', 'E', 'I', 'O', 'U', 'Y'];
      const firstLetter = month.trim().charAt(0).toUpperCase();
      const article = vowels.includes(firstLetter) ? "d'" : "de ";
      return `Leaderboard du mois ${article}${month}`;
    }

    /**
     * Vérifie si tous les utilisateurs ont des MEPs nuls ou indéfinis
     * @param {Array} data Données du leaderboard
     * @returns {boolean}
     */
    function allMepsZero(data) {
      return data.every(user => !user.meps || user.meps === 0);
    }

    /**
     * Affiche le podium
     * @param {Array} topThree Les trois premiers utilisateurs
     * @param {string} podiumWrapperId ID du conteneur du podium
     * @param {string} period Période (current ou previous)
     * @param {Object} rankChangeMap Map usrGUID -> 'up'|'down'|'same' (pour le mois actuel)
     */
    function displayPodium(topThree, podiumWrapperId, period, rankChangeMap) {
      const podiumWrapper = document.getElementById(podiumWrapperId);
      podiumWrapper.innerHTML = '';
      rankChangeMap = rankChangeMap || {};

      const positions = ['second', 'first', 'third'];
      const orders = [1, 0, 2];

      orders.forEach((order, index) => {
        const user = topThree[order];
        const positionClass = positions[index];
        const stepDiv = document.createElement('div');
        stepDiv.classList.add('step', positionClass);

        // Gestion différente des animations selon le contexte
        if (isFirstLoad) {
          stepDiv.classList.add('animate');
          // Supprimer la classe animate après l'animation d'entrée
          stepDiv.addEventListener('animationend', function (event) {
            if (event.animationName === 'slideUp') {
              stepDiv.classList.remove('animate');
              // On force la position finale
              stepDiv.style.transform = 'translateY(0)';
            }
          });
        } else {
          // Pour les mises à jour, on place directement en position finale
          stepDiv.style.transform = 'translateY(0)';
          setTimeout(() => {
            stepDiv.classList.add('update');
            // Retirer la classe update après l'animation
            stepDiv.addEventListener('animationend', function (event) {
              if (event.animationName === 'pulse') {
                stepDiv.classList.remove('update');
                // On s'assure que la position finale est maintenue
                stepDiv.style.transform = 'translateY(0)';
              }
            }, { once: true });
          }, 100);
        }

        const profileDiv = document.createElement('div');
        profileDiv.classList.add('profile');

        const nameDiv = document.createElement('div');
        nameDiv.classList.add('name', 'coach-name-bidi');
        nameDiv.dir = 'auto';
        nameDiv.textContent = user.nickname;
        profileDiv.appendChild(nameDiv);

        const rankChange = rankChangeMap[user.usrGUID];
        if (rankChange) {
          const rankChangeWrap = document.createElement('div');
          rankChangeWrap.classList.add('podium-rank-change');
          rankChangeWrap.innerHTML = getRankChangeSvg(rankChange);
          profileDiv.appendChild(rankChangeWrap);
        }

        // Bloc unique : barre Myzone + MEPs (barre dans le même bloc que le nombre)
        const mepsBlock = document.createElement('div');
        mepsBlock.classList.add('podium-meps-block');

        const podiumZoneBar = document.createElement('div');
        podiumZoneBar.classList.add('podium-zone-bar');
        podiumZoneBar.innerHTML = getZoneBarHtml(user);
        mepsBlock.appendChild(podiumZoneBar);

        const mepsDiv = document.createElement('div');
        mepsDiv.classList.add('podium-meps', positionClass);
        mepsDiv.textContent = formatNumber(user.meps);
        mepsDiv.setAttribute('data-meps', user.meps);
        mepsBlock.appendChild(mepsDiv);

        const mepsLabelDiv = document.createElement('div');
        mepsLabelDiv.classList.add('meps-label');
        mepsLabelDiv.textContent = 'MEPs';
        mepsBlock.appendChild(mepsLabelDiv);

        profileDiv.appendChild(mepsBlock);

        stepDiv.appendChild(profileDiv);

        const positionDiv = document.createElement('div');
        positionDiv.classList.add('position');
        positionDiv.textContent = user.position;
        stepDiv.appendChild(positionDiv);

        // Affiche l'icône de statut uniquement si elle est définie
        if (user.iconLink) {
          const statusIconDiv = document.createElement('div');
          statusIconDiv.classList.add('status-icon-podium');
          statusIconDiv.style.backgroundImage = `url(${user.iconLink})`;
          stepDiv.appendChild(statusIconDiv);
        }

        // Ajoute la photo du coach si l'utilisateur est un coach
        if (user.type === 'Coach') {
          const coachPhoto = document.createElement('img');
          coachPhoto.classList.add('coach-podium-photo');
          coachPhoto.src = leaderboardCoachPhotoSrc(user);
          coachPhoto.alt = `Photo du coach ${user.nickname}`;
          stepDiv.appendChild(coachPhoto);
        }

        podiumWrapper.appendChild(stepDiv);
      });

      if (isFirstLoad) {
        const steps = podiumWrapper.querySelectorAll('.step.animate');
        let animationsCompleted = 0;

        steps.forEach(step => {
          step.addEventListener("animationend", function (event) {
            if (event.animationName === 'slideUp') {
              animationsCompleted++;
            }
          });
        });
      }

      // Animation des MEPs si les données ont changé
      animateMepsChanges(topThree, period, true);
    }

    /**
     * Affiche le leaderboard
     * @param {Array} data Données du leaderboard
     * @param {string} leaderboardId ID du conteneur du leaderboard
     * @param {string} period Période (current ou previous)
     * @param {Object} rankChangeMap Map usrGUID -> 'up'|'down'|'same' (uniquement pour current, entre deux mises à jour)
     */
    function displayLeaderboard(data, leaderboardId, period, rankChangeMap) {
      const leaderboardContainer = document.getElementById(leaderboardId);

      const today = new Date();
      const dayOfMonth = today.getDate();
      // Après le 7 : classement jusqu'à 20 (3 podium + 17 lignes). Avant le 7 : 10 (3 + 7)
      const topEntries = dayOfMonth <= 7 ? 10 : 20;

      const leaderboardData = data.slice(3, topEntries);

      leaderboardContainer.innerHTML = createLeaderboardTable(leaderboardData, period, rankChangeMap || {});
    }

    function getRankChangeSvg(type) {
      if (type === 'up') {
        return '<span class="rank-change-icon rank-up" title="Gain de position"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg></span>';
      }
      if (type === 'down') {
        return '<span class="rank-change-icon rank-down" title="Perte de position"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>';
      }
      if (type === 'same') {
        return '<span class="rank-change-icon rank-same" title="Même position"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></span>';
      }
      return '';
    }

    function getZoneBarHtml(user) {
      const z1 = Number(user.zone1MEPs) || 0;
      const z2 = Number(user.zone2MEPs) || 0;
      const z3 = Number(user.zone3MEPs) || 0;
      const z4 = Number(user.zone4MEPs) || 0;
      const z5 = Number(user.zone5MEPs) || 0;
      const total = z1 + z2 + z3 + z4 + z5;
      if (total <= 0) {
        return '<div class="zone-bar zone-bar-empty"></div><div class="zone-pie zone-pie-empty"></div>';
      }
      const p1 = (z1 / total) * 100;
      const p2 = (z2 / total) * 100;
      const p3 = (z3 / total) * 100;
      const p4 = (z4 / total) * 100;
      const p5 = (z5 / total) * 100;
      var barHtml = '<div class="zone-bar">' +
        '<span class="zone-seg zone-1" style="width:' + p1 + '%"></span>' +
        '<span class="zone-seg zone-2" style="width:' + p2 + '%"></span>' +
        '<span class="zone-seg zone-3" style="width:' + p3 + '%"></span>' +
        '<span class="zone-seg zone-4" style="width:' + p4 + '%"></span>' +
        '<span class="zone-seg zone-5" style="width:' + p5 + '%"></span>' +
        '</div>';
      var cone = 'rgba(108,109,111,0.75) 0% ' + p1 + '%, ' +
        'rgba(12,93,231,0.75) ' + p1 + '% ' + (p1 + p2) + '%, ' +
        'rgba(0,178,66,0.75) ' + (p1 + p2) + '% ' + (p1 + p2 + p3) + '%, ' +
        'rgba(250,233,28,0.75) ' + (p1 + p2 + p3) + '% ' + (p1 + p2 + p3 + p4) + '%, ' +
        'rgba(224,0,0,0.75) ' + (p1 + p2 + p3 + p4) + '% 100%';
      var pieHtml = '<div class="zone-pie" style="background: conic-gradient(' + cone + ')"></div>';
      return barHtml + pieHtml;
    }

    /**
     * Crée le tableau du leaderboard
     * @param {Array} leaderboardData Données du leaderboard
     * @param {string} period Période (current ou previous)
     * @param {Object} rankChangeMap Map usrGUID -> 'up'|'down'|'same'
     * @returns {string} HTML du tableau
     */
    function createLeaderboardTable(leaderboardData, period, rankChangeMap) {
      rankChangeMap = rankChangeMap || {};
      var tableHtml = '<div class="leaderboard">';
      leaderboardData.forEach(function (user) {
        const isPodium = user.position === 1 || user.position === 2 || user.position === 3;
        const rankChange = rankChangeMap[user.usrGUID];
        const rankChangeSvg = getRankChangeSvg(rankChange);
        const zoneBarHtml = getZoneBarHtml(user);

        var coachPhotoUrlRow = user.type === 'Coach' ? leaderboardCoachPhotoSrc(user) : '';
        tableHtml += `
            <div class="leaderboard-row">
                <span class="rank-cell">
                    <span class="rank">${user.position}</span>
                    ${rankChangeSvg}
                </span>

                <!-- Photo du coach si le type est Coach -->
                ${user.type === 'Coach' ? `<img class="coach-photo" src="${coachPhotoUrlRow}" alt="Photo de ${user.nickname}" />` : ''}
                
                <span class="nickname coach-name-bidi" dir="auto">${user.nickname}</span>
                <span class="leaderboard-meps">
                    <div class="zone-bar-wrap">${zoneBarHtml}</div>
                    <div class="leaderboard-meps-row">
                        <span class="status-icon" style="background-image: url(${user.iconLink || ''});"></span>
                        <span class="meps-value">${formatNumber(user.meps)}</span>
                        <span class="meps-label">MEPs</span>
                    </div>
                </span>

                <!-- Ajout de la photo du coach sur le podium -->
                ${isPodium && user.type === 'Coach' ? `
                    <img class="coach-podium-photo" src="${coachPhotoUrlRow}" alt="Photo podium de ${user.nickname}" />
                ` : ''}
            </div>`;
      });
      tableHtml += '</div>';
      return tableHtml;
    }

    /**
     * Formate un nombre avec des espaces
     * @param {number} num Nombre à formater
     * @returns {string} Nombre formaté
     */
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    /**
     * Anime les changements de MEPs
     * @param {Array} newData Nouvelles données
     * @param {string} period Période (current ou previous)
     * @param {boolean} isPodium Indique si c'est pour le podium
     */
    function animateMepsChanges(newData, period, isPodium = false) {
      if (!previousData[period] || !previousData[period].data) return;

      const oldData = previousData[period].data;

      newData.forEach((user, index) => {
        const oldUser = oldData.find(u => u.nickname === user.nickname);
        if (oldUser && user.meps > oldUser.meps) {
          const mepsElements = document.querySelectorAll(`[data-meps="${user.meps}"]`);

          mepsElements.forEach(element => {
            // Animation de l'incrémentation des chiffres
            animateValue(element.querySelector('.meps-value'), oldUser.meps, user.meps, 1000);
            // Zoom sur le bloc
            element.style.transform = 'scale(1.2)';
            setTimeout(() => {
              element.style.transform = 'scale(1)';
            }, 1000);
          });
        }
      });
    }

    /**
     * Anime la valeur numérique
     * @param {HTMLElement} obj Élément DOM
     * @param {number} start Valeur de départ
     * @param {number} end Valeur de fin
     * @param {number} duration Durée de l'animation
     */
    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.textContent = formatNumber(Math.floor(progress * (end - start) + start));
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }

    function initializePage() {
      // Ajouter la classe loading au body
      document.body.classList.add('loading');

      // Vérifier si on est sur mobile
      const isMobile = window.innerWidth <= 600;
      if (isMobile) {
        document.querySelector('.logo-container').style.display = 'none';
      }

      // Masquer les conteneurs pendant le chargement
      document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.month-block').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.podium-wrapper').forEach(el => el.style.display = 'none');
      document.querySelector('.competition-container').style.display = 'none';

      const loadingOverlay = document.getElementById('loadingOverlay');
      if (SHOW_LOADING_OVERLAY) {
        loadingOverlay.style.display = 'flex';
        loadingOverlay.classList.remove('fade-out');
      } else {
        loadingOverlay.style.display = 'none';
      }

      // Charger les données après un court délai
      setTimeout(() => {
        loadLeaderboard();
      }, 500);
    }

    // Appeler initializePage au chargement
    document.addEventListener('DOMContentLoaded', initializePage);
  </script>
</body>

</html>
