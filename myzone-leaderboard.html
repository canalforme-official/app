<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, initial-scale=1.0, user-scalable=no">
  <title>Myzone Leaderboard - Canal Forme</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

    /* Réinitialisation des marges et des paddings */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Styles généraux */
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow-x: hidden; /* Masque la barre de défilement en vue desktop */
      overflow-y: hidden;
      scrollbar-width: none; /* Pour Firefox */
      max-width: 100vw; /* Limite la largeur à la taille de l'écran */
    }

    /* Masque la barre de défilement en vue desktop pour les navigateurs Webkit */
    body::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    .container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      box-sizing: border-box;
    }

    .logo-container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 0;
      background-color: #000000;
    }

    .logo {
      max-width: 200px;
      height: auto;
    }

    /* Titre du mois */
    .month-title {
      font-size: 1.2em;
      font-weight: bold;
      color: #ffffff;
      margin: 10px 0;
      text-align: center;
    }

    /* Bloc du mois */
    .month-block {
      background-color: #ffffff;
      color: #000000;
      padding: 20px;
      border-radius: 16px 16px 0 0;
      width: 95%;
      max-width: 600px;
      box-shadow: 0 5px 10px rgba(255, 0, 0, 0.4);
      margin-top: -28px;
      position: relative;
    }

    .last-update {
      position: absolute;
      top: -20px;
      right: 0;
      color: #ffffff;
      font-size: 0.9em;
      display: none;
    }

    /* Styles du leaderboard */
    .leaderboard {
      width: 100%;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 16px;
      height: 50px; /* Ajuste cette valeur selon la hauteur que tu préfères */
      position: relative; /* Pour positionner les points par rapport à chaque ligne */
    }

    .leaderboard-row:last-child {
      border-bottom: none;
    }

    .rank {
      font-weight: bold;
      width: 30px;
      text-align: left;
      flex-shrink: 0;
    }

    .nickname {
      flex: 1;
      text-align: left;
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .leaderboard-meps {
      display: flex;
      align-items: center;
      font-weight: bold;
      background-color: rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      padding: 4px;
      min-width: 140px;
      max-width: 140px;
      justify-content: space-between;
      transition: transform 0.3s ease;
    }

    .leaderboard-meps .status-icon {
      width: 22px;
      height: 22px;
      margin-right: 5px;
    }

    .leaderboard-meps .meps-value {
      margin-right: 5px;
    }

    .leaderboard-meps .meps-label {
      font-size: 0.8em;
      color: #888;
      text-align: right;
    }

    #countdown {
      font-size: 0.7em;
      position: absolute;
      top: 10px;
      right: 10px;
      color: #797979;
    }

    /* Overlay de chargement */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      flex-direction: column;
    }

    .loading-logo img {
      width: 50px;
      height: 50px;
      animation: zoom-logo 1.5s ease-in-out infinite;
    }

    @keyframes zoom-logo {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    #loadingMessage {
      margin-top: 50px;
      font-size: 1.5em;
      color: #fff;
      text-align: center;
      width: 80%;
      max-width: 600px;
      background-color: rgba(255, 255, 255, 0.2);
      padding: 10px;
      border-radius: 10px;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Styles pour les appareils mobiles */
    @media (max-width: 600px) {
      body {
        font-size: 12px;
        overflow-y: auto; /* Réactive la barre de défilement sur mobile */
      }

      .month-block {
        padding: 15px;
      }

      .leaderboard-row {
        font-size: 14px;
        padding: 8px 0;
      }

      .rank {
        width: 25px;
      }

      .leaderboard-meps .status-icon {
        width: 22px;
        height: 22px;
      }

      .leaderboard-content {
        padding-right: 30px;
      }

          /* Réduction de la largeur de la ligne de MEPs */
      .meps-line {
        right: -25px; /* Ajuste cette valeur selon l’affichage */
        width: 1px;
      }

      /* Réduction de la taille des points pour mobile */
      .meps-point {
        right: -43px; /* Ajuste pour aligner avec la ligne de MEPs */
        width: 5px;
        height: 5px;
      }

      /* Ajustement de la taille de l’icône du coach */
      .coach-icon {
        width: 25px;
        height: 25px;
        right: -58px; 
      }

      /* Cercle de classement du coach plus petit */
      .coach-rank-circle {
        width: 14px;
        height: 14px;
        top: -5px;
        right: -5px;
        font-size: 0.6em;
      }

      /* Réduction de la taille de la pillule des MEPs */
      .meps-pill {
        font-size: 0.7em;
        padding: 1px 2px;
      }

    }

    /* Styles pour le podium */
    .podium-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      padding: 20px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      margin-top: 20px;
    }

    .step {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 16px 16px 0 0;
      text-align: center;
      width: 130px;
      transform: translateY(100%);
      animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: visible;
    }

    .step.animate {
      /* Classe pour contrôler l'animation */
    }

    .step::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
      border-radius: 16px 16px 0 0;
    }

    .step.first {
      height: 220px;
      background: linear-gradient(150deg,
          #FFE5B4 0%,
          #FFD700 20%,
          #FFC600 40%,
          #FFD700 60%,
          #FDB600 80%,
          #FFD700 100%
      );
      order: 2;
      animation-delay: 0.4s;
    }

    .step.second {
      height: 180px;
      background: linear-gradient(150deg,
          #F5F5F5 0%,
          #C0C0C0 20%,
          #A8A8A8 40%,
          #C0C0C0 60%,
          #989898 80%,
          #C0C0C0 100%
      );
      order: 1;
      animation-delay: 0.2s;
    }

    .step.third {
      height: 150px;
      background: linear-gradient(150deg,
          #DFA878 0%,
          #CD7F32 20%,
          #B87333 40%,
          #CD7F32 60%,
          #A66A2E 80%,
          #CD7F32 100%
      );
      order: 3;
      animation-delay: 0s;
    }

    .sparkles-container {
      position: absolute;
      top: -100px;
      left: 0;
      width: 100%;
      height: calc(100% + 100px);
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #FFD700;
      border-radius: 2px;
      animation: fall 3s linear infinite;
    }

    .sparkle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .sparkle:nth-child(2) { left: 20%; animation-delay: 0.5s; }
    .sparkle:nth-child(3) { left: 30%; animation-delay: 1s; }
    .sparkle:nth-child(4) { left: 40%; animation-delay: 1.5s; }
    .sparkle:nth-child(5) { left: 50%; animation-delay: 0.2s; }
    .sparkle:nth-child(6) { left: 60%; animation-delay: 0.7s; }
    .sparkle:nth-child(7) { left: 70%; animation-delay: 1.2s; }
    .sparkle:nth-child(8) { left: 80%; animation-delay: 1.7s; }
    .sparkle:nth-child(9) { left: 90%; animation-delay: 0.4s; }
    .sparkle:nth-child(10) { left: 15%; animation-delay: 0.9s; }
    .sparkle:nth-child(11) { left: 45%; animation-delay: 1.4s; }
    .sparkle:nth-child(12) { left: 75%; animation-delay: 1.9s; }

    .sparkle:nth-child(even) {
      width: 6px;
      height: 6px;
      background: linear-gradient(135deg, #FFD700, #FFF);
      box-shadow: 0 0 4px rgba(255, 215, 0, 0.6);
    }

    .sparkle:nth-child(3n) {
      width: 3px;
      height: 3px;
      background: #FFF;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
    }

    .status-icon {
        background-size: cover;
        background-position: center;
        display: inline-block;
        background-color: transparent; /* Assure un fond transparent */
        border: none; /* Assure qu'il n'y a pas de bordure */
        box-shadow: none; /* Assure qu'il n'y a pas d'ombre */
    }

    .status-icon-podium {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      animation: appearWithScale 0.5s ease-out forwards;
      animation-delay: 2s;
    }

    .profile {
      position: relative;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
      width: 100%;
      padding: 0 8px;
      z-index: 1;
    }

    .step.third .profile { animation-delay: 1s; }
    .step.second .profile { animation-delay: 1.2s; }
    .step.first .profile { animation-delay: 1.4s; }

    .name {
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      font-size: 0.9rem;
      margin: 8px 0 6px;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .podium-meps {
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      font-weight: 700;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      background: rgba(0,0,0,0.1);
      padding: 4px 4px;
      border-radius: 8px;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .step.third .podium-meps { animation-delay: 1.5s; }
    .step.second .podium-meps { animation-delay: 1.7s; }
    .step.first .podium-meps { animation-delay: 1.9s; }

    .podium-meps.first { font-size: 1.6rem; }
    .podium-meps.second { font-size: 1.5rem; }
    .podium-meps.third { font-size: 1.4rem; }

    .meps-label {
      font-size: 0.7em;
      color: white;
      opacity: 0.9;
      letter-spacing: 2px;
      margin-top: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .position {
      position: absolute;
      bottom: 0;
      left: 0;
      font-weight: bold;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
      line-height: 0.72;
      color: rgba(0, 0, 0, 0.01);
    }

    .step.first .position { font-size: 6rem; }
    .step.second .position { font-size: 5rem; }
    .step.third .position { font-size: 4rem; }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes appearWithScale {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      20% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(300px) rotate(360deg);
        opacity: 0;
      }
    }

    @media (min-width: 601px) {
      .step {
        width: 150px;
      }

      body {
        overflow-y: hidden;
      }

      .meps-line {
        right: -30px; /* Position correcte pour les écrans desktop */
      }

      .meps-point {
        right: -53px; /* Assure l'alignement avec la ligne */
      }

      .coach-icon {
        right: -68px; /* Positionnement pour rester visible */
      }

      .meps-pill {
        font-size: 0.6em;
      }

      .podium-meps.first { font-size: 1.8rem; }
      .podium-meps.second { font-size: 1.6rem; }
      .podium-meps.third { font-size: 1.5rem; }
    }

    #totalMepsContainer {
      text-align: center;
      font-weight: bold;
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    /* Style pour l'indicateur de tirage vers le bas */
    .pull-to-refresh {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 80px;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      font-size: 14px;
      transform: translateY(-80px); /* Cache initialement */
      transition: transform 0.3s ease-out;
      z-index: 1000;
    }

    .pull-to-refresh.show {
      transform: translateY(0); /* Montre l’indicateur */
    }

    .loading-spinner {
      width: 25px;
      height: 25px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #ff0000;
      border-radius: 50%;
      margin-top: 5px;
      display: none; /* Caché initialement */
    }

    .loading-spinner.active {
      display: block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    * {
      user-select: none;
      -webkit-user-select: none; /* Chrome, Safari, Opera */
      -moz-user-select: none;    /* Firefox */
      -ms-user-select: none;     /* Internet Explorer/Edge */
    }

    .hidden {
      display: none !important;
      margin: 0 !important;
      padding: 0 !important;
      height: 0 !important;
    }


#currentMonthLeaderboard,
#previousMonthLeaderboard {
  position: relative;
}

  <script>

    /* code pour mise à jour avec tirage*/
    // Variables pour le tirage et l'élément de rafraîchissement
    let startY = 0;
    let isPulling = false;
    const pullThreshold = 120; // Distance de tirage nécessaire
    let timer = 60;

    const loadingOverlay = document.getElementById('loadingOverlay');

    // Fonction pour redémarrer le compteur de rafraîchissement automatique
    function resetCountdown() {
      clearInterval(countdownInterval);
      timer = 60;
      countdownInterval = setInterval(() => {
        timer--;
        if (timer <= 0) {
          loadLeaderboard(); // Recharge automatiquement après 60 secondes
          timer = 60;
        }
      }, 1000);
    }

    // Détecte le début du tirage
    document.addEventListener("touchstart", (e) => {
      startY = e.touches[0].pageY;
      isPulling = false;
    });

    // Gère le tirage vers le bas
    document.addEventListener("touchmove", (e) => {
      const currentY = e.touches[0].pageY;
      const pullDistance = currentY - startY;

      // Marque pour le chargement lorsque le seuil est atteint
      if (pullDistance > pullThreshold) {
        isPulling = true;
      }
    });

    // Gère la fin du tirage et lance la mise à jour
    document.addEventListener("touchend", () => {
      if (isPulling) {
        loadLeaderboard(); // Rafraîchit le contenu
      }
      isPulling = false;
    });









    let isFirstLoad = true;
    let countdownInterval;
    let previousData = {};
    let isInitialAnimationDone = false; // Pour contrôler l'animation du podium

    /**
     * Affiche l'overlay de chargement lors du premier chargement
     */
    function showLoadingOverlay() {
      if (isFirstLoad) {
        document.getElementById('loadingOverlay').style.display = 'flex';
      }
    }

    /**
     * Cache l'overlay de chargement et affiche le contenu principal
     */
    function hideLoadingOverlay() {
      document.getElementById('loadingOverlay').style.display = 'none';
      const containers = document.querySelectorAll('.container');
      containers.forEach(container => container.style.display = 'flex');
      isFirstLoad = false;
    }

    /**
     * Charge le leaderboard depuis le fichier JSON
     */

     function loadLeaderboard() {
      //fetch('./leaderboard.json')
      fetch('https://raw.githubusercontent.com/canalforme-official/app-data/main/leaderboard.json?cache_bust=${timestamp}')
    .then(response => response.json())
    .then(data => {
      // Séparer les coachs et les utilisateurs
      const coaches = data.current.data.filter(user => user.type === "Coach");
      const users = data.current.data.filter(user => user.type !== "Coach");
      
      // Trier les utilisateurs par MEPs décroissants
      users.sort((a, b) => b.meps - a.meps);
      // Recalculer les positions des utilisateurs
      users.forEach((user, index) => user.position = index + 1);
      
      // Affecter les données triées aux données actuelles
      data.current.data = users;

      // Stocker les coachs dans `data.current.coaches`
      data.current.coaches = coaches;

      // Faites de même pour le mois précédent si nécessaire
      if (data.previous) {
        const previousCoaches = data.previous.data.filter(user => user.type === "Coach");
        const previousUsers = data.previous.data.filter(user => user.type !== "Coach");
        previousUsers.sort((a, b) => b.meps - a.meps);
        previousUsers.forEach((user, index) => user.position = index + 1);
        data.previous.data = previousUsers;
        data.previous.coaches = previousCoaches;
      }

      updateLeaderboard(data);
      if (isFirstLoad) {
        hideLoadingOverlay();
      }
      startCountdown(60);
    })
    .catch(error => {
      console.error("Erreur lors du chargement du leaderboard:", error);
      hideLoadingOverlay();
    });
}





    /**
     * Démarre le compte à rebours pour la mise à jour
     * @param {number} duration Durée en secondes
     */
    function startCountdown(duration) {
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }

      let timer = duration;
      const countdownElement = document.getElementById('countdown');

      function updateCountdown() {
        let minutes = Math.floor(timer / 60);
        let seconds = timer % 60;

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        countdownElement.textContent = "Prochaine mise à jour dans : " + minutes + ":" + seconds;

        if (--timer < 0) {
          clearInterval(countdownInterval);
          loadLeaderboard();
        }
      }

      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    /**
     * Met à jour le leaderboard avec les nouvelles données
     * @param {Object} data Données du leaderboard
     */
     function updateLeaderboard(data) {
  const today = new Date();
  const dayOfMonth = today.getDate();

  if (data.current && data.current.data && !allMepsZero(data.current.data)) {
    const currentMonthTitle = formatMonthTitle(data.current.month);
    document.getElementById('currentMonthTitle').textContent = currentMonthTitle;

    displayPodium(data.current.data.slice(0, 3), 'podiumWrapper', 'current');
    displayLeaderboard(data.current, 'currentMonthLeaderboard', 'current');

    document.getElementById('currentMonthContainer').style.display = 'flex';
    document.getElementById('podiumWrapper').style.display = 'flex';
    document.getElementById('currentMonthTitle').style.display = 'block';

    document.getElementById('countdown').style.display = 'block';
  } else {
    document.getElementById('currentMonthContainer').style.display = 'none';
    document.getElementById('currentMonthTitle').style.display = 'none';
    document.getElementById('podiumWrapper').style.display = 'none';
    document.getElementById('countdown').style.display = 'none';
  }

  if (dayOfMonth <= 7 && data.previous && data.previous.data && !allMepsZero(data.previous.data)) {
    const previousMonthTitle = formatMonthTitle(data.previous.month);
    document.getElementById('previousMonthTitle').textContent = previousMonthTitle;

    displayPodium(data.previous.data.slice(0, 3), 'previousPodiumWrapper', 'previous');
    displayLeaderboard(data.previous, 'previousMonthLeaderboard', 'previous');

    const previousMonthContainer = document.getElementById('previousMonthContainer');
    previousMonthContainer.style.display = 'flex';
    previousMonthContainer.style.marginTop = '-28px';
    previousMonthContainer.classList.remove('hidden');

    document.getElementById('previousPodiumWrapper').style.display = 'flex';
    document.getElementById('previousMonthTitle').style.display = 'block';

    const previousMepsLine = previousMonthContainer.querySelector('.meps-line');
    if (previousMepsLine) {
      previousMepsLine.style.display = 'block';
    }
  } else {
    const previousMonthContainer = document.getElementById('previousMonthContainer');
    previousMonthContainer.style.display = 'none';
    previousMonthContainer.style.marginTop = '0';
    previousMonthContainer.classList.add('hidden');

    const previousMepsLine = previousMonthContainer.querySelector('.meps-line');
    if (previousMepsLine) {
      previousMepsLine.style.display = 'none';
    }
  }

  const currentMonthContainer = document.getElementById('currentMonthContainer');
  if (data.current && data.current.data && !allMepsZero(data.current.data)) {
    currentMonthContainer.style.display = 'flex';
    const currentMepsLine = currentMonthContainer.querySelector('.meps-line');
    if (currentMepsLine) {
      currentMepsLine.style.display = 'block';
    }
  } else {
    const currentMepsLine = currentMonthContainer.querySelector('.meps-line');
    if (currentMepsLine) {
      currentMepsLine.style.display = 'none';
    }
  }

  previousData = data;
}



    /**
     * Formate le titre du mois en fonction de la première lettre
     * @param {string} month Nom du mois
     * @returns {string} Titre formaté
     */
    function formatMonthTitle(month) {
      const vowels = ['A', 'E', 'I', 'O', 'U', 'Y'];
      const firstLetter = month.trim().charAt(0).toUpperCase();
      const article = vowels.includes(firstLetter) ? "d'" : "de ";
      return `Leaderboard du mois ${article}${month}`;
    }

    /**
     * Vérifie si tous les utilisateurs ont des MEPs nuls ou indéfinis
     * @param {Array} data Données du leaderboard
     * @returns {boolean}
     */
    function allMepsZero(data) {
      return data.every(user => !user.meps || user.meps === 0);
    }

    /**
     * Affiche le podium
     * @param {Array} topThree Les trois premiers utilisateurs
     * @param {string} podiumWrapperId ID du conteneur du podium
     * @param {string} period Période (current ou previous)
     */
    function displayPodium(topThree, podiumWrapperId, period) {
      const podiumWrapper = document.getElementById(podiumWrapperId);
      podiumWrapper.innerHTML = '';

      const positions = ['second', 'first', 'third'];
      const orders = [1, 0, 2];

      orders.forEach((order, index) => {
        const user = topThree[order];
        const positionClass = positions[index];
        const stepDiv = document.createElement('div');
        stepDiv.classList.add('step', positionClass);

        // Ajoute la classe 'animate' uniquement lors du premier chargement
        if (isFirstLoad) {
          stepDiv.classList.add('animate');
        } else {
          stepDiv.style.transform = 'translateY(0)';
        }

        const profileDiv = document.createElement('div');
        profileDiv.classList.add('profile');

        const nameDiv = document.createElement('div');
        nameDiv.classList.add('name');
        nameDiv.textContent = user.nickname;
        profileDiv.appendChild(nameDiv);

        const mepsDiv = document.createElement('div');
        mepsDiv.classList.add('podium-meps', positionClass);
        mepsDiv.textContent = formatNumber(user.meps);
        mepsDiv.setAttribute('data-meps', user.meps);
        profileDiv.appendChild(mepsDiv);

        const mepsLabelDiv = document.createElement('div');
        mepsLabelDiv.classList.add('meps-label');
        mepsLabelDiv.textContent = 'MEPs';
        profileDiv.appendChild(mepsLabelDiv);

        stepDiv.appendChild(profileDiv);

        const positionDiv = document.createElement('div');
        positionDiv.classList.add('position');
        positionDiv.textContent = user.position;
        stepDiv.appendChild(positionDiv);

        // Affiche l'icône de statut uniquement si elle est définie
        if (user.iconLink) {
          const statusIconDiv = document.createElement('div');
          statusIconDiv.classList.add('status-icon-podium');
          statusIconDiv.style.backgroundImage = `url(${user.iconLink})`;
          stepDiv.appendChild(statusIconDiv);
        }

        // Toujours afficher les étincelles pour le premier
        if (positionClass === 'first') {
          const sparklesContainer = document.createElement('div');
          sparklesContainer.classList.add('sparkles-container');
          sparklesContainer.style.opacity = '0'; // Commence invisible

          for (let i = 0; i < 12; i++) {
            const sparkleDiv = document.createElement('div');
            sparkleDiv.classList.add('sparkle');
            sparklesContainer.appendChild(sparkleDiv);
          }
          stepDiv.appendChild(sparklesContainer);
        }

        podiumWrapper.appendChild(stepDiv);
      });

      if (isFirstLoad) {
        const steps = podiumWrapper.querySelectorAll('.step.animate');
        const sparklesContainer = podiumWrapper.querySelector('.sparkles-container');
        let animationsCompleted = 0;

        steps.forEach(step => {
          step.addEventListener("animationend", function(event) {
            if (event.animationName === 'slideUp') {
              animationsCompleted++;
              if (animationsCompleted === steps.length && sparklesContainer) {
                // Affiche les étincelles après l'animation du podium
                sparklesContainer.style.opacity = '1';
              }
            }
          });
        });
      } else {
        // Affiche les étincelles immédiatement si ce n'est pas le premier chargement
        const sparklesContainer = podiumWrapper.querySelector('.sparkles-container');
        if (sparklesContainer) {
          sparklesContainer.style.opacity = '1';
        }
      }

      // Animation des MEPs si les données ont changé
      animateMepsChanges(topThree, period, true);
    }

    /**
 * Affiche le leaderboard
 * @param {Array} data Données du leaderboard
 * @param {string} leaderboardId ID du conteneur du leaderboard
 * @param {string} period Période (current ou previous)
 */
 function displayLeaderboard(data, leaderboardId, period) {
  const leaderboardContainer = document.getElementById(leaderboardId);
  const today = new Date();
  const dayOfMonth = today.getDate();
  const topEntries = dayOfMonth <= 7 ? 10 : 20;
  const leaderboardData = data && data.data ? data.data.slice(3, topEntries) : [];

  leaderboardContainer.innerHTML = '';

  if (leaderboardData.length === 0) {
    console.error("Aucune donnée de leaderboard disponible.");
    return;
  }

  const rows = [];

  leaderboardData.forEach((user, index) => {
    const row = document.createElement('div');
    row.classList.add('leaderboard-row');

    row.innerHTML = `
      <span class="rank">${user.position}</span>
      <span class="nickname">${user.nickname}</span>
      <span class="leaderboard-meps">
        <span class="status-icon" style="background-image: url(${user.iconLink || ''});"></span>
        <span class="meps-value">${formatNumber(user.meps)}</span>
        <span class="meps-label">MEPs</span>
      </span>
    `;

    leaderboardContainer.appendChild(row);
    rows.push(row);
  });

  // Positionner les points après que les éléments aient leurs dimensions
  requestAnimationFrame(() => positionMepsPoints(rows, leaderboardContainer));

  // Appelle displayCoachIcons après que le rendu initial est terminé
  requestAnimationFrame(() => {
    if (data.coaches && data.coaches.length > 0) {
      // Supposons que data.coaches est trié par MEPs décroissants
      data.coaches.forEach((coach, index) => {
        displayCoachIcon(coach, leaderboardContainer, rows, leaderboardData, data.coaches, index);
      });
    }
  });
}

function positionMepsPoints(rows, container) {
  rows.forEach((row) => {
    const point = document.createElement('div');
    point.classList.add('meps-point');
    point.style.top = `${row.offsetTop + row.offsetHeight / 2}px`;
    container.appendChild(point);
  });
}

function displayCoachIcon(coach, container, rows, leaderboardData, coaches, coachIndex = 0) {
    console.log(`Affichage du coach : ${coach.nickname} - MEPs : ${coach.meps}`);
    
    const coachIcon = document.createElement('div');
    coachIcon.classList.add('coach-icon');
    coachIcon.style.backgroundImage = `url(${coach.coachLink})`;

    // Déterminer la limite pour le classement selon le jour du mois
    const today = new Date();
    const dayOfMonth = today.getDate();
    const topEntriesLimit = dayOfMonth <= 7 ? 10 : 20;

    // Log du jour actuel et de la limite de classement
    console.log(`Jour actuel : ${dayOfMonth}, limite du classement : ${topEntriesLimit} positions`);
    const lastPositionMEPs = leaderboardData.length >= topEntriesLimit
        ? leaderboardData[topEntriesLimit - 1].meps
        : leaderboardData[leaderboardData.length - 1]?.meps || 0;

    console.log(`MEPs de la ${topEntriesLimit}ᵉ position : ${lastPositionMEPs}`);

    let coachPositionSet = false;
    const verticalOffset = 15 * coachIndex; // Décalage vertical

    // **Case 1** : Le coach a des MEPs inférieurs à la dernière position de la limite actuelle
    if (coach.meps < lastPositionMEPs) {
        const lastRow = rows[rows.length - 1];
        if (lastRow) {
            coachIcon.style.top = `${lastRow.offsetTop + lastRow.offsetHeight + verticalOffset}px`;
            coachPositionSet = true;
            console.log(`Coach ${coach.nickname} est positionné sous la dernière position.`);
        }
    } 
    // **Case 2** : Le coach a des MEPs supérieurs ou égaux au 4ème
    else if (coach.meps >= leaderboardData[2].meps) {
        const firstRow = rows[0];
        if (firstRow) {
            coachIcon.style.top = `${firstRow.offsetTop - firstRow.offsetHeight - verticalOffset}px`;
            coachPositionSet = true;
            console.log(`Coach ${coach.nickname} est positionné au-dessus de la 4ème position.`);
        }
    } 
    // **Case 3** : Le coach a des MEPs entre le 4ème et le dernier
    else {
        const filteredLeaderboard = leaderboardData.filter(user => user.type !== "Coach");
        let positionIndex = filteredLeaderboard.findIndex(user => coach.meps >= user.meps);
        if (positionIndex === -1) {
            positionIndex = filteredLeaderboard.length;
        }

        const targetRow = rows[positionIndex]; // Ligne de la personne située juste en dessous du coach

        if (targetRow) {
            coachIcon.style.top = `${targetRow.offsetTop + verticalOffset-20}px`;
            coachPositionSet = true;
            console.log(`Coach ${coach.nickname} est placé à la hauteur de ${filteredLeaderboard[positionIndex]?.nickname || 'N/A'}.`);
        } else {
            console.log(`Impossible de trouver une ligne pour placer le coach ${coach.nickname}.`);
        }
    }

    // Fallback en cas d'échec du positionnement
    if (!coachPositionSet) {
        const lastRow = rows[rows.length - 1];
        if (lastRow) {
            coachIcon.style.top = `${lastRow.offsetTop + lastRow.offsetHeight + verticalOffset}px`;
            console.log(`Fallback : Coach ${coach.nickname} positionné en bas par défaut.`);
        } else {
            coachIcon.style.top = '0px';
            console.log(`Fallback : Coach ${coach.nickname} positionné au top par défaut.`);
        }
    }

    // Classement du coach parmi les autres coachs
    const sortedCoaches = coaches.slice().sort((a, b) => b.meps - a.meps);
    const coachRank = sortedCoaches.findIndex(c => c.nickname === coach.nickname) + 1;
    console.log(`Classement du coach ${coach.nickname} : #${coachRank}`);

    // Création du cercle pour afficher le classement du coach
    const rankCircle = document.createElement('div');
    rankCircle.classList.add('coach-rank-circle');
    rankCircle.textContent = `#${coachRank}`;
    coachIcon.appendChild(rankCircle); // Ajoute le cercle comme enfant de coachIcon

    // Création de la pillule pour afficher les MEPs du coach
    const mepsPill = document.createElement('div');
    mepsPill.classList.add('meps-pill');
    mepsPill.innerHTML = `<span class="meps-count">${formatNumber(coach.meps)}</span> <span class="meps-text">MEPs</span>`;
    mepsPill.style.top = '90%';
    mepsPill.style.left = '50%';
    mepsPill.style.transform = 'translate(-50%)';

    coachIcon.appendChild(mepsPill);
    container.appendChild(coachIcon);
}














    /**
     * Crée le tableau du leaderboard
     * @param {Array} leaderboardData Données du leaderboard
     * @param {string} period Période (current ou previous)
     * @returns {string} HTML du tableau
     */
     function createLeaderboardTable(leaderboardData) {
        var tableHtml = '<div class="leaderboard">';
        leaderboardData.forEach(function(user) {
            tableHtml += `
                <div class="leaderboard-row">
                    <span class="rank">${user.position}</span>
                    <span class="nickname">${user.nickname}</span>
                    <span class="leaderboard-meps">
                        <span class="status-icon" style="background-image: url(${user.iconLink || ''});"></span>
                        <span class="meps-value">${formatNumber(user.meps)}</span>
                        <span class="meps-label">MEPs</span>
                    </span>
                </div>`;
        });
        tableHtml += '</div>';
        return tableHtml;
    }


    /**
     * Formate un nombre avec des espaces
     * @param {number} num Nombre à formater
     * @returns {string} Nombre formaté
     */
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    /**
     * Anime les changements de MEPs
     * @param {Array} newData Nouvelles données
     * @param {string} period Période (current ou previous)
     * @param {boolean} isPodium Indique si c'est pour le podium
     */
    function animateMepsChanges(newData, period, isPodium = false) {
      if (!previousData[period] || !previousData[period].data) return;

      const oldData = previousData[period].data;

      newData.forEach((user, index) => {
        const oldUser = oldData.find(u => u.nickname === user.nickname);
        if (oldUser && user.meps > oldUser.meps) {
          const mepsElements = document.querySelectorAll(`[data-meps="${user.meps}"]`);

          mepsElements.forEach(element => {
            // Animation de l'incrémentation des chiffres
            animateValue(element.querySelector('.meps-value'), oldUser.meps, user.meps, 1000);
            // Zoom sur le bloc
            element.style.transform = 'scale(1.2)';
            setTimeout(() => {
              element.style.transform = 'scale(1)';
            }, 1000);
          });
        }
      });
    }

    /**
     * Anime la valeur numérique
     * @param {HTMLElement} obj Élément DOM
     * @param {number} start Valeur de départ
     * @param {number} end Valeur de fin
     * @param {number} duration Durée de l'animation
     */
    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.textContent = formatNumber(Math.floor(progress * (end - start) + start));
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }

    window.onload = () => {
  // Appels existants
  showLoadingOverlay();
  loadLeaderboard();
  resetCountdown();

  // Attendre que tout le contenu soit rendu pour garantir la précision
  setTimeout(() => {
    // Récupère les dimensions du contenu et de la fenêtre
    const contentWidth = document.body.scrollWidth;
    const viewportWidth = window.innerWidth;

    // Si le contenu est plus large que la fenêtre, ajuste le zoom
    if (contentWidth > viewportWidth) {
      const scale = viewportWidth / contentWidth;

      // Applique le zoom en ajustant le style du body
      document.body.style.transform = `scale(${scale})`;
      document.body.style.transformOrigin = 'top left';

      // Ajuste la hauteur pour éviter le décalage vertical
      const scaledHeight = document.body.offsetHeight * scale;
      document.body.style.height = `${scaledHeight}px`;
    }

    // Centre le contenu horizontalement
    const scrollableWidth = document.body.scrollWidth - window.innerWidth;
    if (scrollableWidth > 0) {
      window.scrollTo({
        left: scrollableWidth / 2, // Centrer horizontalement
        top: 0,
        behavior: 'instant' // Rend le centrage immédiat
      });
    }
  }, 100); // Laisse 100 ms pour que tout le contenu soit chargé
};
