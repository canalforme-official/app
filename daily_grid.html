              }).filter(function(c) { return c !== undefined; });

              var coachNamesText = '';
              if (courseCoaches.length === 0) coachNamesText = '–';
              else if (courseCoaches.length === 1) coachNamesText = courseCoaches[0].name || '–';
              else if (courseCoaches.length === 2) coachNamesText = (courseCoaches[0].name || '') + ', ' + (courseCoaches[1].name || '');
              else coachNamesText = (courseCoaches[0].name || '') + ', ' + (courseCoaches[1].name || '') + '...';

              var startTimeStr = course.startTime || '';
              var endTimeStr = course.endTime || '';
              if (!endTimeStr && startTimeStr) {
                var parts = startTimeStr.split(':');
                var h = parseInt(parts[0], 10) || 0;
                var m = parseInt(parts[1], 10) || 0;
                m += 60;
                h += Math.floor(m / 60);
                m = m % 60;
                endTimeStr = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
              }
              var courseCard = document.createElement('div');
              courseCard.className = 'course-card';
              courseCard.setAttribute('data-start-time', startTimeStr);
              courseCard.setAttribute('data-end-time', endTimeStr);
              var courseType = (course.type || '').toString().toLowerCase();
              var studioName = (studio.name || '').toString().toLowerCase();
              if (courseType.indexOf('femme') !== -1) courseCard.classList.add('women-only');
              if (studioName.indexOf('piscine') !== -1 || studioName.indexOf('aqua') !== -1) courseCard.classList.add('pool');

              courseCard.innerHTML = '<div class="course-time">' + (course.startTime || '') + '</div><div class="course-name">' + (courseName || '') + '</div><div class="course-coach">' + (coachNamesText || '–') + '</div>';
              coursesContainer.appendChild(courseCard);
            });
          }

          studioColumn.appendChild(studioTitle);
          studioColumn.appendChild(coursesContainer);
          studiosContainer.appendChild(studioColumn);
        }
      }

      updateCourseCardsState();

      var uniqueCoachIds = [];
      todaysCourses.forEach(function(course) {
        (course.coachIds || []).forEach(function(id) {
          if (id !== undefined && id !== null && uniqueCoachIds.indexOf(id) === -1) uniqueCoachIds.push(id);
        });
      });

      var coachesSection = document.getElementById('coachesSection');
      coachesSection.innerHTML = '';
      var coachListForSection = allData.coachs || [];
      uniqueCoachIds.forEach(function(coachId) {
        var coachData = coachListForSection.find(function(c) { return c && c.id === coachId; });
        if (!coachData) return;
        var coachCard = document.createElement('div');
        coachCard.className = 'coach-card';
        var coachImage = coachPhotoUrl(coachData) || 'https://mcusercontent.com/74abea872abd45d46efed5d41/images/57464fd1-2801-45f5-cb10-2b6b52aecf16.png';
        var disp = coachDisplayName(coachData);
        coachCard.innerHTML = '<img src="' + coachImage + '" alt="' + escapeHtml(disp) + '" class="coach-image" onerror="this.src=\'https://mcusercontent.com/74abea872abd45d46efed5d41/images/57464fd1-2801-45f5-cb10-2b6b52aecf16.png\'"><div class="coach-name coach-name-bidi" dir="auto">' + escapeHtml(disp) + '</div>';
        coachesSection.appendChild(coachCard);
      });

      updateNavButtonsState();
      document.body.setAttribute('data-daily-grid-ready', 'true');
    } finally {
      maybeRestoreScrollAfterPrayer();
    }
    }

    async function loadAndDisplayCourses() {
      try {
        console.log('Début du chargement des données...');
        let response = null;
        let data = null;
        try {
          response = await fetch('./planning-v2.json');
          if (response.ok) {
            data = await response.json();
            console.log('✅ Données planning chargées depuis le fichier local');
          } else {
            throw new Error('Fichier local non disponible');
          }
        } catch (localError) {
          console.log('⚠️ Fichier local non disponible, utilisation de GitHub...');
          response = await fetch('https://raw.githubusercontent.com/canalforme-official/app-data/main/planning-v2.json');
          if (!response.ok) {
            console.error('Erreur fetch:', response.status, response.statusText);
            throw new Error(`Erreur HTTP: ${response.status}`);
          }
          data = await response.json();
          console.log('✅ Données planning chargées depuis GitHub');
        }

        allData = data;
        initPlanningView(allData);
        console.log('Données chargées avec succès:', allData);

        await loadPrayerTimes();
        /* Au premier chargement : URL ou aujourd’hui. Rafraîchissement (setInterval) : garder la date affichée
           pour ne pas réécraser avec un ?date= encore figé sur un jour passé (ex. aujourd’hui). */
        var previousYmd = selectedDateYmd;
        if (!previousYmd || !/^\d{4}-\d{2}-\d{2}$/.test(previousYmd)) {
          selectedDateYmd = ymdFromDate(new Date());
          try {
            var paramsDg = new URLSearchParams(window.location.search);
            var dpDg = paramsDg.get('date');
            if (dpDg && /^\d{4}-\d{2}-\d{2}$/.test(dpDg)) selectedDateYmd = clampNavYmd(dpDg);
          } catch (eDg) {}
        }
        syncDailyGridDateInUrl();
        displayGridSchedule();
      } catch (error) {
        console.error('Erreur lors du chargement des données:', error);
        document.body.setAttribute('data-daily-grid-ready', 'error');
        var container = document.getElementById('studiosContainer');
        if (container) {
          container.innerHTML = '';
          var errDiv = document.createElement('div');
          errDiv.className = 'no-courses-container';
          errDiv.style.cssText = 'text-align:center;padding:20px;color:#c00;font-size:0.9em;';
          errDiv.textContent = 'Erreur de chargement: ' + (error && error.message ? error.message : String(error));
          container.appendChild(errDiv);
        }
      }
    }

    // Fonction pour initialiser la page
    function initializePage() {
      // Charger les cours
      if (typeof loadAndDisplayCourses === 'function') {
        loadAndDisplayCourses();
      }
      
      // Attendre un peu pour que le DOM soit prêt
      setTimeout(() => {
        updateButtonVisibility(); // Gérer l'affichage automatique selon le contexte
      }, 100);
    }
    
    // Appeler dès que possible (si le DOM est déjà chargé)
    if (document.readyState === 'loading') {
      // Le DOM est encore en cours de chargement
      document.addEventListener('DOMContentLoaded', initializePage);
    } else {
      // Le DOM est déjà chargé
      initializePage();
    }
    
    // Au load : ne pas rappeler loadAndDisplayCourses (évite de vider la grille puis refetch = capture Puppeteer blanche)
    window.addEventListener('load', function() {
      updateButtonVisibility(); // Gérer l'affichage automatique selon le contexte
    });
    
    setInterval(loadAndDisplayCourses, 60000);
    setInterval(updateCourseCardsState, 1000);

    // Fonction pour rediriger vers daily.html
    function returnToDaily() {
      window.location.href = 'daily.html';
    }

    function handleResize() {
      if (typeof updateTodayButtonPosition === 'function') {
        updateTodayButtonPosition();
      }
      
      updateButtonVisibility(); // Gérer l'affichage automatique selon le contexte
    }
    
    // Appeler handleResize au redimensionnement de la fenêtre
    window.addEventListener('resize', handleResize);

    document.addEventListener('click', function(e) {
      var a = e.target.closest && e.target.closest('a[href*="prayer-times"]');
      if (!a || !a.getAttribute('href')) return;
      try {
        var ymdDg = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
        var retDg = new URL(window.location.href);
        retDg.searchParams.set('date', ymdDg);
        sessionStorage.setItem('planning_return_url', retDg.toString());
        sessionStorage.setItem('planning_return_scroll', String(window.scrollY || window.pageYOffset || 0));
      } catch (err) {
        try {
          var ymdD2 = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
          var pageDg = (window.location.pathname && window.location.pathname.replace(/^.*\//, '')) || 'daily_grid.html';
          sessionStorage.setItem('planning_return_url', pageDg + '?date=' + encodeURIComponent(ymdD2));
          sessionStorage.setItem('planning_return_scroll', String(window.scrollY || window.pageYOffset || 0));
        } catch (e2) {}
      }
    }, true);
  </script>
