  <script>
    var NAV_DAYS_LIMIT = 180;
    let allData = [];
    /** Date affichée (YYYY-MM-DD), navigation ±N jours autour d’aujourd’hui */
    var selectedDateYmd = '';
    /** Index 0–6 du jour affiché (dérivé de selectedDateYmd) pour compatibilité avec le code existant */
    let currentDayIndex = new Date().getDay();

    function ymdFromDate(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }
    function parseYmdLocal(s) {
      var p = String(s).split('-');
      return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
    }
    function addDaysToYmd(ymd, deltaDays) {
      var d = parseYmdLocal(ymd);
      d.setDate(d.getDate() + deltaDays);
      return ymdFromDate(d);
    }
    function clampNavYmd(ymd) {
      var today = ymdFromDate(new Date());
      var min = addDaysToYmd(today, -NAV_DAYS_LIMIT);
      var max = addDaysToYmd(today, NAV_DAYS_LIMIT);
      if (ymd < min) return min;
      if (ymd > max) return max;
      return ymd;
    }
    function getDayNameFrFromYmd(dateStr) {
      var d = parseYmdLocal(dateStr);
      var days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
      return days[d.getDay()];
    }
    function formatDateFrShort(ymd) {
      var d = parseYmdLocal(ymd);
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
    }
    /** Aligné sur SheetsService.normalizePlanningAfficheKey (régulier | ramadan | ferie | ferme). */
    function normalizePlanningKey(raw) {
      var s = String(raw || '').trim().toLowerCase();
      if (!s) return 'regulier';
      var n = s.replace(/[éèêë]/g, 'e').replace(/[àâ]/g, 'a').replace(/[ùû]/g, 'u');
      if (n === 'ferme' || (n.length >= 4 && n.substring(0, 4) === 'ferm')) return 'ferme';
      if (n.indexOf('ramadan') !== -1) return 'ramadan';
      if ((n.indexOf('jours') !== -1 && n.indexOf('ferie') !== -1) || n === 'ferie' || n.indexOf('ferie') !== -1) return 'ferie';
      if (n.indexOf('regulier') !== -1 || n.indexOf('planning') !== -1) return 'regulier';
      return 'regulier';
    }
    function periodPriorityScore(p) {
      var k = normalizePlanningKey((p && p.planningKey) ? p.planningKey : '');
      if (k === 'ferme') return 4;
      if (k === 'ferie') return 3;
      if (k === 'ramadan') return 2;
      if (k === 'regulier') return 1;
      return 0;
    }
    function isDateInRamadanRange(dateStr, meta) {
      if (!dateStr || !meta || !meta.ramadanStart || !meta.ramadanEnd) return false;
      return dateStr >= meta.ramadanStart && dateStr <= meta.ramadanEnd;
    }
    function findPeriodsForDate(dateStr, periodes) {
      var out = [];
      if (!dateStr || !periodes || !periodes.length) return out;
      for (var i = 0; i < periodes.length; i++) {
        var p = periodes[i];
        if (dateStr >= p.start && dateStr <= p.end) out.push(p);
      }
      return out;
    }
    function getEffectivePeriodForDate(dateStr, periodes) {
      var matches = findPeriodsForDate(dateStr, periodes);
      if (!matches.length) return null;
      var normalized = matches.map(function(p) {
        var o = {};
        for (var k in p) { if (Object.prototype.hasOwnProperty.call(p, k)) o[k] = p[k]; }
        o.planningKey = normalizePlanningKey(p.planningKey);
        return o;
      });
      var best = normalized[0];
      var bestScore = periodPriorityScore(best);
      for (var j = 1; j < normalized.length; j++) {
        var sc = periodPriorityScore(normalized[j]);
        if (sc > bestScore) {
          bestScore = sc;
          best = normalized[j];
        }
      }
      return best;
    }
    /**
     * Résout cours + mode pour une date (priorité § plan : fermé > férié > ramadan > régulier).
     */
    function resolveDailyView(dateStr, data) {
      var periodes = (data.metadata && data.metadata.periods) ? data.metadata.periods : [];
      var eff = getEffectivePeriodForDate(dateStr, periodes);
      var key = eff ? normalizePlanningKey(eff.planningKey) : 'regulier';
      /* Pas de ligne « Ramadan » dans periods : même logique que ramadanStart/End dans le JSON. */
      if (key === 'regulier' && isDateInRamadanRange(dateStr, data.metadata)) {
        key = 'ramadan';
      }
      var periodName = eff && eff.name ? String(eff.name) : '';
      var dayName = getDayNameFrFromYmd(dateStr);
      var planning = data.planning || {};
      var planningRamadan = data.planningRamadan || {};
      var planningFerieByDate = data.planningFerieByDate || {};
      if (key === 'ferme') {
        return { courses: [], planningKey: 'ferme', periodName: periodName, closed: true, indetermine: false, dayName: dayName };
      }
      var arrF = planningFerieByDate[dateStr];
      /* Cours fériés explicites dans le JSON : priorité sur la seule résolution par périodes (ex. oubli de ligne fériée). */
      if (arrF && arrF.length) {
        return { courses: arrF, planningKey: 'ferie', periodName: periodName, closed: false, indetermine: false, dayName: dayName };
      }
      if (key === 'ferie') {
        return { courses: [], planningKey: 'ferie', periodName: periodName, closed: false, indetermine: true, dayName: dayName };
      }
      if (key === 'ramadan') {
        var arrR = planningRamadan[dayName] || [];
        return { courses: arrR, planningKey: 'ramadan', periodName: periodName, closed: false, indetermine: false, dayName: dayName };
      }
      var arrReg = planning[dayName] || [];
      return { courses: arrReg, planningKey: 'regulier', periodName: periodName, closed: false, indetermine: false, dayName: dayName };
    }
    /** Caricatures : date réelle du téléphone du 1er au 7 avril (Poisson d’avril, année courante). */
    function useCaricatureCoachPhotos() {
      var real = new Date();
      if (real.getMonth() !== 3) return false;
      var dom = real.getDate();
      return dom >= 1 && dom <= 7;
    }
    function coachPhotoUrl(coach) {
      if (!coach) return '';
      if (useCaricatureCoachPhotos() && coach.pngCaricature && String(coach.pngCaricature).trim() !== '') {
        return coach.pngCaricature;
      }
      return coach.imageUrl || '';
    }

    function initPlanningView(data) {
      document.body.classList.remove('planning-ramadan');
      document.body.classList.remove('planning-ferie');
    }
    function renderPlanningViewSwitcher(data) {
      var container = document.getElementById('planningViewSwitcher');
      if (container) container.style.display = 'none';
      var ramadanButton = document.getElementById('ramadanSwitchButton');
      if (!ramadanButton) return;
      var isMobile = window.innerWidth <= 768;
      if (!isMobile) {
        ramadanButton.style.display = 'none';
        ramadanButton.classList.remove('loaded');
        return;
      }
      var meta = data.metadata || {};
      var ramadanStart = meta.ramadanStart;
      var ramadanEnd = meta.ramadanEnd;
      var today = ymdFromDate(new Date());
      var viewYmd = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : today;
      function inRamadanRange(ymd) {
        return !!(ramadanStart && ramadanEnd && ymd >= ramadanStart && ymd <= ramadanEnd);
      }
      var inRamadanToday = inRamadanRange(today);
      var viewInRamadan = inRamadanRange(viewYmd);
      var daysBefore = 7;
      var soonBeforeRamadan = ramadanStart && today < ramadanStart &&
        (new Date(ramadanStart) - new Date(today)) / (24 * 60 * 60 * 1000) <= daysBefore;
      var showSwitcher = !!(data.planningRamadan && ramadanStart) &&
        (viewInRamadan || inRamadanToday || soonBeforeRamadan);
      if (showSwitcher) {
        ramadanButton.style.display = 'flex';
        setTimeout(function() { ramadanButton.classList.add('loaded'); }, 100);
      } else {
        ramadanButton.style.display = 'none';
        ramadanButton.classList.remove('loaded');
      }
    }
    function updatePlanningTypeLabelFromView(rv) {
      var label = document.getElementById('planningTypeLabel');
      var stickyLabel = document.getElementById('stickyPlanningTypeLabel');
      var labelText = '';
      var hor = allData && allData.metadata && allData.metadata.horaires ? allData.metadata.horaires : null;
      if (rv.closed) {
        labelText = rv.periodName ? ('Fermé — ' + rv.periodName) : 'Club fermé';
      } else if (rv.planningKey === 'ferie') {
        labelText = rv.periodName ? ('Jour férié — ' + rv.periodName) : 'Jour férié';
      } else if (rv.planningKey === 'ramadan') {
        var lr = hor && hor.ramadan && hor.ramadan.planningLabel;
        labelText = (lr && String(lr).trim()) ? String(lr).trim() : 'Planning Ramadan';
        if (labelText.toLowerCase().indexOf('planning') === -1) {
          labelText = 'Planning ' + labelText;
        }
      } else {
        var lreg = hor && hor.regulier && hor.regulier.planningLabel;
        labelText = (lreg && String(lreg).trim()) ? String(lreg).trim() : 'Planning régulier';
        if (/^planning$/i.test(labelText)) labelText = 'Planning régulier';
      }
      if (label) label.textContent = labelText;
      if (stickyLabel) stickyLabel.textContent = '';
    }

    // Option pour afficher/masquer les images des cours
    const SHOW_COURSE_IMAGES = true; // Mettre à true pour afficher les images, false pour n'afficher que les noms

    function updateTodayButtonPosition() {
      const weeklyButton = document.querySelector('.weekly-view-button');
      const todayButton = document.querySelector('.today-view-button');
      
      if (weeklyButton && todayButton && todayButton.style.display !== 'none') {
        const weeklyButtonRect = weeklyButton.getBoundingClientRect();
        const spacing = 15;
        todayButton.style.top = `${weeklyButtonRect.bottom + spacing}px`;
      }
    }

    function handleResize() {
      const isMobile = window.innerWidth <= 1024;
      const dailyGridButton = document.querySelector('.daily-grid-view-button');
      const weeklyButton = document.querySelector('.weekly-view-button');
      const todayButton = document.querySelector('.today-view-button');
      const navigation = document.querySelector('.navigation');
      
      if (isMobile) {
        if (dailyGridButton) {
          dailyGridButton.style.display = 'block';
          dailyGridButton.classList.add('loaded');
        }
        if (weeklyButton) {
          weeklyButton.style.display = 'block';
          weeklyButton.classList.add('loaded');
        }
        if (todayButton) {
          todayButton.style.display = 'block';
        }
        if (navigation) {
          navigation.style.display = 'flex';
        }
      } else {
        if (dailyGridButton) {
          dailyGridButton.style.display = 'none';
          dailyGridButton.classList.remove('loaded');
        }
        if (weeklyButton) {
          weeklyButton.style.display = 'none';
          weeklyButton.classList.remove('loaded');
        }
        if (todayButton) {
          todayButton.style.display = 'none';
          todayButton.classList.remove('visible');
        }
        if (navigation) {
          navigation.style.display = 'none';
        }
      }
      
      updateTodayButtonPosition();
      if (allData && allData.metadata) {
        renderPlanningViewSwitcher(allData);
      }
    }

    function hideLoadingOverlay() {
      const loadingOverlay = document.getElementById('loadingOverlay');
      const modalContainer = document.querySelector('.modal-center-container');

      if (modalContainer) {
        modalContainer.style.display = 'none';
      }

      loadingOverlay.classList.add('fade-out');

      const isMobile = window.innerWidth <= 1024;
      const navigation = document.querySelector('.navigation');
      const dailyGridButton = document.querySelector('.daily-grid-view-button');
      const weeklyButton = document.querySelector('.weekly-view-button');
      
      if (isMobile) {
        if (navigation) navigation.classList.add('loaded');
        if (dailyGridButton) {
          dailyGridButton.classList.add('loaded');
          dailyGridButton.style.opacity = '1';
          dailyGridButton.style.transform = 'translateY(0)';
          dailyGridButton.style.pointerEvents = 'all';
        }
        if (weeklyButton) {
          weeklyButton.classList.add('loaded');
          weeklyButton.style.opacity = '1';
          weeklyButton.style.transform = 'translateY(0)';
          weeklyButton.style.pointerEvents = 'all';
        }
      }

      document.body.classList.remove('loading');

      updateTodayButtonPosition();

      setTimeout(() => {
        loadingOverlay.style.display = 'none';
      }, 300);
    }

    async function fetchAllData() {
      try {
        let response = null;
        let data = null;
        try {
          response = await fetch('./planning-v2.json');
          if (response.ok) {
            data = await response.json();
            console.log('✅ Données planning chargées depuis le fichier local');
          } else {
            throw new Error('Fichier local non disponible');
          }
        } catch (localError) {
          console.log('⚠️ Fichier local non disponible, utilisation de GitHub...');
          response = await fetch('https://raw.githubusercontent.com/canalforme-official/app-data/main/planning-v2.json');
          if (!response.ok) {
            throw new Error('Impossible de charger le planning depuis GitHub');
          }
          data = await response.json();
          console.log('✅ Données planning chargées depuis GitHub');
        }

        allData = data;
        initPlanningView(data);
        renderPlanningViewSwitcher(data);

        localStorage.setItem('planningData', JSON.stringify(allData));
        localStorage.setItem('lastUpdate', new Date().toISOString());

        selectedDateYmd = ymdFromDate(new Date());
        try {
          var params = new URLSearchParams(window.location.search);
          var dp = params.get('date');
          if (dp && /^\d{4}-\d{2}-\d{2}$/.test(dp)) selectedDateYmd = clampNavYmd(dp);
        } catch (e) {}
        displaySchedule();
        hideLoadingOverlay();
        
        // Charger les horaires de prière après le chargement des données principales
        await loadPrayerTimes();
      } catch (error) {
        console.error('Erreur lors du chargement des données:', error);
        // En cas d'erreur, essayer d'utiliser les données en cache
        const cachedData = localStorage.getItem('planningData');
        if (cachedData) {
          allData = JSON.parse(cachedData);
          initPlanningView(allData);
          renderPlanningViewSwitcher(allData);
          selectedDateYmd = ymdFromDate(new Date());
          try {
            var params2 = new URLSearchParams(window.location.search);
            var dp2 = params2.get('date');
            if (dp2 && /^\d{4}-\d{2}-\d{2}$/.test(dp2)) selectedDateYmd = clampNavYmd(dp2);
          } catch (e2) {}
          displaySchedule();
          hideLoadingOverlay();
          await loadPrayerTimes();
        }
      }
    }

    /**
     * Charge les horaires de prière et affiche le badge Maghrib si on est en période Ramadan
     */
    async function loadPrayerTimes() {
      try {
        if (!allData || !allData.metadata) return;

        const ramadanStart = allData.metadata.ramadanStart;
        const ramadanEnd = allData.metadata.ramadanEnd;
        if (!ramadanStart || !ramadanEnd) return;

        const today = ymdFromDate(new Date());
        const sel = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : today;
        function inRamadanWindow(ymd) {
          return ymd >= ramadanStart && ymd <= ramadanEnd;
        }
        /* Charger dès qu’aujourd’hui ou la date affichée tombe dans le Ramadan (navigation). */
        if (!inRamadanWindow(today) && !inRamadanWindow(sel)) {
          updateMaghribBadge();
          return;
        }

        if (window.prayerTimesData && window.prayerTimesData.prayerTimes) {
          updateMaghribBadge();
          return;
        }

        let prayerData = null;
        try {
          const localResp = await fetch('./prayer-times.json');
          if (localResp.ok) {
            prayerData = await localResp.json();
            console.log('✅ Horaires de prière chargés depuis le fichier local');
          } else {
            throw new Error('Fichier local non disponible');
          }
        } catch (localError) {
          console.log('⚠️ Fichier local non disponible, utilisation de GitHub...');
          const remoteResp = await fetch('https://raw.githubusercontent.com/canalforme-official/app-data/main/prayer-times.json');
          if (!remoteResp.ok) {
            console.warn('Impossible de charger les horaires de prière');
            updateMaghribBadge();
            return;
          }
          prayerData = await remoteResp.json();
          console.log('✅ Horaires de prière chargés depuis GitHub');
        }
        window.prayerTimesData = prayerData;
        updateMaghribBadge();
      } catch (error) {
        console.warn('Erreur lors du chargement des horaires de prière:', error);
        updateMaghribBadge();
      }
    }

    /** Badge Maghrib retiré en vue Ramadan : l’heure est dans la barre d’ouverture (icône coucher). */
    function updateMaghribBadge() {
      var badge = document.getElementById('maghribBadge');
      var stickyBadge = document.getElementById('stickyMaghribBadge');
      if (badge) badge.classList.add('hidden');
      if (stickyBadge) stickyBadge.classList.add('hidden');
      if (!allData || !allData.planning) return;
      var ymd = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
      renderOpeningHoursBar(resolveDailyView(ymd, allData));
    }

    function renderOpeningHoursBar(rv) {
      var ohBar = document.getElementById('openingHoursBar');
      if (!ohBar) return;
      if (!rv || rv.closed || !allData.metadata || !allData.metadata.horaires) {
        ohBar.innerHTML = '';
        return;
      }
      var hk = allData.metadata.horaires[rv.planningKey];
      var maghribForBar = '';
      if (rv.planningKey === 'ramadan' && window.prayerTimesData && window.prayerTimesData.prayerTimes) {
        var ymd = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
        var pt = window.prayerTimesData.prayerTimes[ymd];
        if (pt && pt.maghrib) maghribForBar = pt.maghrib;
      }
      var line = formatOpeningHoursCompactHtml(hk, maghribForBar);
      ohBar.innerHTML = line || '';
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text == null ? '' : String(text);
      return div.innerHTML;
    }
    function formatOpeningHoursHtml(h) {
      if (!h) return '';
      var esc = escapeHtml;
      function chip(label, openT, closeT) {
        var lab = (label && String(label).trim())
          ? '<span class="oh-chip-label">' + esc(String(label).trim()) + '</span>'
          : '';
        var times = '<span class="oh-chip-times"><span class="oh-time">' + esc(openT) + '</span><span class="oh-sep">–</span><span class="oh-time">' + esc(closeT) + '</span></span>';
        return '<span class="oh-chip">' + lab + times + '</span>';
      }
      var parts = [];
      if (h.open1 && h.close1) parts.push(chip(h.open1Label, h.open1, h.close1));
      if (h.open2 && h.close2) parts.push(chip(h.open2Label, h.open2, h.close2));
      return parts.length ? '<div class="oh-inner">' + parts.join('') + '</div>' : '';
    }
    /** Horaires sans libellés, une seule cellule : plage1 · plage2 */
    function formatOpeningHoursCompactHtml(h, maghribTime) {
      if (!h) return '';
      var esc = escapeHtml;
      function range(openT, closeT) {
        return '<span class="oh-chip-times"><span class="oh-time">' + esc(openT) + '</span><span class="oh-sep">–</span><span class="oh-time">' + esc(closeT) + '</span></span>';
      }
      var ranges = [];
      if (h.open1 && h.close1) ranges.push(range(h.open1, h.close1));
      if (h.open2 && h.close2) ranges.push(range(h.open2, h.close2));
      if (!ranges.length) return '';
      var sep = '<span class="oh-sep-slot" aria-hidden="true"></span>';
      if (maghribTime && String(maghribTime).trim()) {
        sep = '<span class="oh-sep-slot-stack" aria-hidden="true"><span class="oh-maghrib-time">' + esc(String(maghribTime).trim()) + '</span><span class="oh-sep-slot"></span></span>';
      }
      var inner = ranges.join(sep);
      return '<div class="oh-inner oh-inner--compact"><span class="oh-chip oh-chip--compact">' + inner + '</span></div>';
    }
    function displayClosedMessage(rv) {
      var name = rv.periodName ? escapeHtml(rv.periodName) : '';
      var isTodayView = selectedDateYmd === ymdFromDate(new Date());
      var title = isTodayView ? 'Club fermé aujourd’hui' : 'Club fermé';
      if (name) title += ' — ' + name;
      return '<div class="timeline-message timeline-message--closed" role="status">' +
        '<div class="closed-card">' +
        '<strong class="closed-title">' + title + '</strong>' +
        '<p class="closed-text">Aucun cours prévu pour cette journée.</p>' +
        '</div></div>';
    }

    /** Confettis à chaque changement de « mode » jour (navigation). */
    var lastPlanningKeyForConfetti = null;
    function spawnConfettiBurst(colors) {
      if (!colors || !colors.length) return;
      var layer = document.createElement('div');
      layer.className = 'confetti-layer';
      layer.setAttribute('aria-hidden', 'true');
      var n = 120;
      var i;
      for (i = 0; i < n; i++) {
        var p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = 8 + Math.random() * 84 + '%';
        p.style.background = colors[i % colors.length];
        p.style.animationDelay = Math.random() * 0.35 + 's';
        p.style.animationDuration = 1.8 + Math.random() * 0.9 + 's';
        var drift = (Math.random() - 0.5) * 220;
        var rot = 360 + Math.random() * 720;
        p.style.setProperty('--dx', drift + 'px');
        p.style.setProperty('--rot', rot + 'deg');
        layer.appendChild(p);
      }
      document.body.appendChild(layer);
      setTimeout(function() {
        if (layer.parentNode) layer.parentNode.removeChild(layer);
      }, 2800);
    }
    function triggerPlanningModeConfetti(planningKey) {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        lastPlanningKeyForConfetti = planningKey;
        return;
      }
      if (lastPlanningKeyForConfetti === null) {
        lastPlanningKeyForConfetti = planningKey;
        return;
      }
      if (lastPlanningKeyForConfetti === planningKey) return;
      lastPlanningKeyForConfetti = planningKey;
      var palettes = {
        regulier: ['#480607', '#6b1218', '#8b2942', '#a02828'],
        ramadan: ['#26462d', '#3d6b47', '#4a8c5e', '#2d5a38', '#1e3a24', '#5a8f6a', '#a8d4b8'],
        ferie: ['#e6b800', '#ffc107', '#f59e0b', '#fff3cd', '#fbbf24', '#fde047']
      };
      /* Jours fermés : même confettis jaunes que férié */
      var paletteKey = planningKey === 'ferme' ? 'ferie' : planningKey;
      var colors = palettes[paletteKey] || palettes.regulier;
      spawnConfettiBurst(colors);
    }
    function displayIndetermineMessage(rv) {
      var name = rv && rv.periodName ? escapeHtml(rv.periodName) : '';
      var holidayLine = name ? '<p class="indetermine-holiday">' + name + '</p>' : '';
      return '<div class="timeline-message timeline-message--indetermine" role="status">' +
        '<div class="indetermine-card">' +
        '<strong class="indetermine-title">Planning à déterminer</strong>' +
        holidayLine +
        '<p class="indetermine-text">Un planning sera publié prochainement. Vous serez averti par notification ; il s’affichera ici dès la mise à jour.</p>' +
        '</div></div>';
    }

    function updateNavButtonsState() {
      var today = ymdFromDate(new Date());
      var min = addDaysToYmd(today, -NAV_DAYS_LIMIT);
      var max = addDaysToYmd(today, NAV_DAYS_LIMIT);
      var prevBtn = document.getElementById('prevDay');
      var nextBtn = document.getElementById('nextDay');
      if (prevBtn) prevBtn.disabled = selectedDateYmd <= min;
      if (nextBtn) nextBtn.disabled = selectedDateYmd >= max;
    }

    function planningUrlsMatchForRestore(currentHref, savedHref) {
      try {
        var a = new URL(currentHref, window.location.origin || undefined);
        var b = new URL(savedHref, window.location.origin || undefined);
        if (a.pathname !== b.pathname) return false;
        var da = a.searchParams.get('date') || '';
        var db = b.searchParams.get('date') || '';
        return da === db;
      } catch (e) {
        return currentHref.split('#')[0] === (savedHref || '').split('#')[0];
      }
    }
    function maybeRestoreScrollAfterPrayer() {
      try {
        if (sessionStorage.getItem('planning_should_restore_scroll') !== '1') return;
        var savedUrl = sessionStorage.getItem('planning_return_url') || '';
        if (savedUrl && !planningUrlsMatchForRestore(window.location.href.split('#')[0], savedUrl.split('#')[0])) return;
        var y = sessionStorage.getItem('planning_return_scroll');
        sessionStorage.removeItem('planning_should_restore_scroll');
        sessionStorage.removeItem('planning_return_url');
        sessionStorage.removeItem('planning_return_scroll');
        if (y == null) return;
        var n = parseInt(y, 10);
        if (isNaN(n)) return;
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            window.scrollTo(0, n);
          });
        });
      } catch (e) {}
    }

    function displaySchedule() {
      if (!selectedDateYmd) selectedDateYmd = ymdFromDate(new Date());
      var scheduleContainer = document.getElementById('timeline');
      if (!scheduleContainer) return;
      if (!allData || !allData.planning) return;

      try {
      var skipAutoScroll = false;
      try {
        skipAutoScroll = sessionStorage.getItem('planning_should_restore_scroll') === '1';
      } catch (e) {}

      var dayIndex = parseYmdLocal(selectedDateYmd).getDay();
      currentDayIndex = dayIndex;

      var days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
      var dayOfWeek = days[dayIndex];
      var displayDayOfWeek = dayOfWeek.charAt(0).toUpperCase() + dayOfWeek.slice(1);
      var dateLabel = formatDateFrShort(selectedDateYmd);

      var dayOfWeekElement = document.getElementById('dayOfWeek');
      if (dayOfWeekElement) dayOfWeekElement.innerText = displayDayOfWeek;

      var dateStrEl = document.getElementById('dateStr');
      if (dateStrEl) dateStrEl.innerText = dateLabel;

      var stickyDayName = document.getElementById('stickyDayName');
      var stickyDayNameSpan = stickyDayName ? stickyDayName.querySelector('.day-name') : null;
      var stickyDayDateSpan = stickyDayName ? stickyDayName.querySelector('.day-date') : null;
      if (stickyDayNameSpan) stickyDayNameSpan.innerText = displayDayOfWeek;
      if (stickyDayDateSpan) stickyDayDateSpan.innerText = dateLabel;

      var rv = resolveDailyView(selectedDateYmd, allData);
      document.body.classList.toggle('planning-ramadan', rv.planningKey === 'ramadan');
      document.body.classList.toggle('planning-ferie', rv.planningKey === 'ferie' || rv.planningKey === 'ferme');
      updatePlanningTypeLabelFromView(rv);

      updateMaghribBadge();
      if (rv.planningKey === 'ramadan' && (!window.prayerTimesData || !window.prayerTimesData.prayerTimes)) {
        loadPrayerTimes();
      }
      renderPlanningViewSwitcher(allData);
      triggerPlanningModeConfetti(rv.planningKey);

      if (rv.closed) {
        scheduleContainer.className = 'timeline no-courses';
        scheduleContainer.innerHTML = displayClosedMessage(rv);
        toggleTodayButton();
        if (!skipAutoScroll) window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        updateNavButtonsState();
        updateTodayButtonPosition();
        return;
      }

      if (rv.indetermine) {
        scheduleContainer.className = 'timeline no-courses';
        scheduleContainer.innerHTML = displayIndetermineMessage(rv);
        toggleTodayButton();
        if (!skipAutoScroll) window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        updateNavButtonsState();
        updateTodayButtonPosition();
        return;
      }

      var courses = rv.courses || [];
      if (!courses.length) {
        scheduleContainer.className = 'timeline no-courses';
        scheduleContainer.innerHTML = displayNoCourseMessage();
        toggleTodayButton();
        if (!skipAutoScroll) window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        updateNavButtonsState();
        updateTodayButtonPosition();
        return;
      }

      scheduleContainer.className = 'timeline has-courses';
      var scheduleHTML = '';

      courses.forEach(function(course) {
        var cours = allData.cours.find(function(c) { return c.id === course.coursId; });
        var coachs = course.coachIds.map(function(coachId) { return allData.coachs.find(function(c) { return c.id === coachId; }); }).filter(Boolean);
        var isMultipleCoachs = coachs.length > 1;
        var studio = allData.studios.find(function(s) { return s.id === course.studioId; });

        if (!cours || !coachs.length || !studio) {
          console.error('Données manquantes pour le cours:', course);
          return;
        }

        var courseTypeClass = '';
        var courseTypeText = course.type || 'Mixte';

        if (courseTypeText === '100% Femmes') {
          courseTypeClass = 'women-only';
        } else if (courseTypeText === 'Mixte') {
          courseTypeClass = 'mixte';
        }

        if (studio.name.toLowerCase().includes('piscine') || studio.name.toLowerCase().includes('aqua')) {
          courseTypeClass += ' piscine';
        }

        var courseStatusClass = '';
        var todayYmd = ymdFromDate(new Date());
        var startParts = course.startTime.split(':').map(Number);
        var endParts = course.endTime.split(':').map(Number);
        var courseStartTime = startParts[0] * 60 + startParts[1];
        var courseEndTime = endParts[0] * 60 + endParts[1];

        if (selectedDateYmd < todayYmd) {
          courseStatusClass = 'past';
        } else if (selectedDateYmd > todayYmd) {
          courseStatusClass = 'upcoming';
        } else {
          var now = new Date();
          var currentTime = now.getHours() * 60 + now.getMinutes();
          if (currentTime >= courseStartTime && currentTime <= courseEndTime) {
            courseStatusClass = 'current focus';
          } else if (currentTime < courseStartTime && courseStartTime - currentTime <= 15) {
            courseStatusClass = 'starting-soon focus';
          } else if (currentTime < courseStartTime) {
            courseStatusClass = 'upcoming';
          } else {
            courseStatusClass = 'past';
          }
        }

        var defaultCoachImg = 'https://mcusercontent.com/74abea872abd45d46efed5d41/images/8fd797c9-5e06-60a8-1720-128bcf9390cf.png';
        var coachImagesHTML = coachs.map(function(coach) {
          var imgSrc = coachPhotoUrl(coach) || defaultCoachImg;
          return '<div class="coach-item ' + (isMultipleCoachs ? '' : 'single') + '">' +
            '<img class="coach-photo ' + (isMultipleCoachs ? 'multiple' : '') + '" src="' + imgSrc + '" alt="' + escapeHtml(coach.name) + '">' +
            (!isMultipleCoachs ? '<span>' + escapeHtml(coach.name) + '</span>' : '') +
            '</div>';
        }).join('');

        scheduleHTML +=
          '<div class="timeline-block ' + (courseStatusClass.indexOf('past') !== -1 ? 'past' : '') + ' ' + (courseStatusClass.indexOf('current') !== -1 ? 'current' : '') + '" data-start-time="' + course.startTime + '" data-end-time="' + course.endTime + '">' +
            '<div class="time">' + course.startTime + ' - ' + course.endTime + '</div>' +
            '<div class="course-block ' + courseTypeClass + ' ' + courseStatusClass + '" id="' + (courseStatusClass.indexOf('focus') !== -1 ? 'focus-course' : '') + '">' +
              '<div class="course-studio">' +
                (studio.imageUrl ? '<img src="' + studio.imageUrl + '" alt="' + escapeHtml(studio.name) + '">' : '') +
              '</div>' +
              '<div class="course-type">' + escapeHtml(courseTypeText) + '</div>' +
              '<div class="course-title">' +
                (SHOW_COURSE_IMAGES && cours.logo
                  ? '<img src="' + cours.logo + '" alt="' + escapeHtml(cours.name) + '" style="max-width: 150px; max-height: 55px;" />'
                  : '<h3>' + escapeHtml(cours.name) + '</h3>') +
              '</div>' +
              '<div class="course-coach"><div class="coach-images">' + coachImagesHTML + '</div></div>' +
              (courseStatusClass.indexOf('starting-soon') !== -1 ? '<div class="countdown" data-start-time="' + course.startTime + '"></div>' : '') +
            '</div>' +
          '</div>';
      });

      scheduleContainer.innerHTML = scheduleHTML;
      toggleTodayButton();

      if (!skipAutoScroll) {
        if (isSelectedDateToday()) {
          if (areAllCoursesInThePast(courses)) {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
          } else {
            scrollToNextUpcomingCourse();
          }
          initializeCountdowns();
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      } else {
        if (isSelectedDateToday()) initializeCountdowns();
      }

      updateNavButtonsState();
      updateTodayButtonPosition();
    } finally {
      maybeRestoreScrollAfterPrayer();
    }
    }

    function isSelectedDateToday() {
      return selectedDateYmd === ymdFromDate(new Date());
    }

    function isToday(dayIndex) {
      return isSelectedDateToday() && dayIndex === new Date().getDay();
    }

    function getDayName(dayIndex) {
      const days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
      return days[dayIndex];
    }

    function returnToToday() {
      if (isSelectedDateToday()) return;
      var todayButton = document.getElementById('todayViewButton');
      if (todayButton) {
        todayButton.classList.remove('visible');
        setTimeout(function() {
          todayButton.style.display = 'none';
          selectedDateYmd = ymdFromDate(new Date());
          currentDayIndex = new Date().getDay();
          displaySchedule();
          window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
          updateTodayButtonPosition();
          setTimeout(function() { scrollToNextUpcomingCourse(); }, 100);
        }, 300);
      } else {
        selectedDateYmd = ymdFromDate(new Date());
        currentDayIndex = new Date().getDay();
        displaySchedule();
      }
    }

    function toggleTodayButton() {
      var todayButton = document.getElementById('todayViewButton');
      var scheduleContainer = document.getElementById('timeline');
      if (!todayButton || !scheduleContainer) return;

      if (isSelectedDateToday()) {
        todayButton.style.display = 'block';
        todayButton.classList.add('visible');
        requestAnimationFrame(function() {
          todayButton.classList.remove('visible');
          setTimeout(function() {
            todayButton.style.display = 'none';
          }, 300);
        });
      } else {
        todayButton.style.display = 'block';
        requestAnimationFrame(function() {
          updateTodayButtonPosition();
          requestAnimationFrame(function() {
            todayButton.classList.add('visible');
          });
        });
      }
    }

    function changeDay(direction) {
      var next = addDaysToYmd(selectedDateYmd, direction);
      var clamped = clampNavYmd(next);
      if (clamped !== next) return;
      selectedDateYmd = clamped;
      var todayButton = document.getElementById('todayViewButton');
      if (isSelectedDateToday() && todayButton) {
        todayButton.classList.remove('visible');
        setTimeout(function() {
          todayButton.style.display = 'none';
        }, 300);
      }
      displaySchedule();
      window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
    }

    function areAllCoursesInThePast(courses) {
      const now = new Date();
      const currentTime = now.getHours() * 60 + now.getMinutes();

      return courses.every(course => {
        const [endHour, endMinute] = course.endTime.split(':').map(Number);
        const courseEndTime = endHour * 60 + endMinute;
        return courseEndTime < currentTime;
      });
    }

    function scrollToNextUpcomingCourse() {
      const now = new Date();
      const currentTime = now.getHours() * 60 + now.getMinutes();
      let firstCurrentCourse = null;
      let nextUpcomingCourse = null;
      let allPast = true;
      let earliestStartTime = Infinity;

      const courseBlocks = document.querySelectorAll('.timeline-block');

      courseBlocks.forEach((block) => {
        const timeElement = block.querySelector('.time');
        const [startTime, endTime] = timeElement.innerText.split(" - ");
        const [startHour, startMin] = startTime.split(":").map(Number);
        const [endHour, endMin] = endTime.split(":").map(Number);
        const courseStartTime = startHour * 60 + startMin;
        const courseEndTime = endHour * 60 + endMin;

        if (currentTime >= courseStartTime && currentTime <= courseEndTime) {
          if (!firstCurrentCourse || courseStartTime < earliestStartTime) {
            firstCurrentCourse = block;
            earliestStartTime = courseStartTime;
          }
          allPast = false;
        }
        else if (currentTime < courseStartTime) {
          if (!nextUpcomingCourse || courseStartTime < earliestStartTime) {
            nextUpcomingCourse = block;
            earliestStartTime = courseStartTime;
          }
          allPast = false;
        }
      });

      if (firstCurrentCourse) {
        firstCurrentCourse.scrollIntoView({ 
          behavior: 'smooth', 
          block: 'start',
          inline: 'nearest'
        });
      } else if (nextUpcomingCourse) {
        nextUpcomingCourse.scrollIntoView({ 
          behavior: 'smooth', 
          block: 'start',
          inline: 'nearest'
        });
      } else if (allPast) {
        window.scrollTo({ 
          top: document.body.scrollHeight, 
          behavior: 'smooth',
          left: 0
        });
      }
    }

    const noCourseMessages = [
      "Profitez de cette journée pour vous reposer et reprendre des forces ! Nous vous attendons demain pour un entraînement intense. 💪",
      "Prenez soin de vous aujourd'hui, et retrouvez-nous dès demain pour continuer vos objectifs !",
      "Conseil du jour : Hydratez-vous bien et pensez à inclure des protéines et des légumes dans vos repas ! 🌱🥤",
      "Le saviez-vous ? Dormir au moins 7 heures améliore la récupération et les performances sportives ! 😴",
      "Suggestions pour aujourd'hui : ✨ Méditation guidée, 🚶 Promenade en plein air, 🧘 Étirements et relaxation"
    ];

    const noCourseImages = [
      "https://mcusercontent.com/74abea872abd45d46efed5d41/images/70a8506a-23ce-3fc3-0e6d-2bc78a5b13d6.png",
      "https://mcusercontent.com/74abea872abd45d46efed5d41/images/fc0db061-f08d-2db2-ab2e-341f4d9a067d.png",
      "https://mcusercontent.com/74abea872abd45d46efed5d41/images/54cf9bc8-ad8e-2aef-1c5a-ae060b1f6d9b.png",
      "https://mcusercontent.com/74abea872abd45d46efed5d41/images/2e02ff47-a45e-f793-0166-8a61a5c3cb1d.png",
      "https://mcusercontent.com/74abea872abd45d46efed5d41/images/5a6492bf-169c-0807-fa9b-fbc2cc5bfaa8.png"
    ];

    function displayNoCourseMessage() {
      const today = new Date().toLocaleDateString('fr-FR');
      const cachedDate = localStorage.getItem('noCourseMessageDate');
      const cachedMessage = localStorage.getItem('noCourseMessage');
      const cachedImage = localStorage.getItem('noCourseImage');

      let message, image;

      if (cachedDate === today && cachedMessage && cachedImage) {
        message = cachedMessage;
        image = cachedImage;
      } else {
        const randomIndex = Math.floor(Math.random() * noCourseMessages.length);
        message = noCourseMessages[randomIndex];
        image = noCourseImages[randomIndex];

        localStorage.setItem('noCourseMessageDate', today);
        localStorage.setItem('noCourseMessage', message);
        localStorage.setItem('noCourseImage', image);
      }

      return `
        <div style="text-align: center; font-style: italic; font-size: 1.2em; margin: 20px;">
          <img src="${image}" alt="Image de repos" style="max-width: 100%; height: auto; margin-bottom: 20px; border-radius: 10px;">
          <p class="quote-text">${message}</p>
        </div>
      `;
    }

    function initializeCountdowns() {
      updateCountdowns();
      setInterval(updateCountdowns, 1000);
    }

    function updateCountdowns() {
      const now = new Date();
      const currentTimeMinutes = now.getHours() * 60 + now.getMinutes();

      const countdownElements = document.querySelectorAll('.countdown');
      countdownElements.forEach(el => {
        const startTimeStr = el.getAttribute('data-start-time');
        const [startHour, startMinute] = startTimeStr.split(':').map(Number);
        const startTime = new Date();
        startTime.setHours(startHour, startMinute, 0, 0);
        const diff = startTime - now;
        
        // Récupérer le bloc parent du cours
        const courseBlock = el.closest('.timeline-block');
        
        if (diff > 0) {
          const minutes = Math.floor(diff / 60000);
          const seconds = Math.floor((diff % 60000) / 1000);
          el.innerHTML = `Démarrage dans&nbsp;<span style="display: inline-block; min-width: 45px; text-align: center;">${minutes}:${seconds.toString().padStart(2, '0')}</span>`;
        } else if (diff > -60 * 1000) {
          el.innerHTML = 'Démarrage imminent';
        } else {
          el.remove();
          if (!courseBlock.classList.contains('current')) {
            courseBlock.classList.add('current', 'focus');
            courseBlock.classList.remove('starting-soon');
            // Retirer la classe starting-soon du course-block aussi
            const courseBlockElement = courseBlock.querySelector('.course-block');
            if (courseBlockElement) {
              courseBlockElement.classList.remove('starting-soon');
            }
          }
        }
      });

      // Passer les blocs "en cours" en "passés" dès que l'heure de fin est dépassée (icône rotation, etc.)
      const currentBlocks = document.querySelectorAll('.timeline-block.current');
      currentBlocks.forEach(block => {
        const endTimeStr = block.getAttribute('data-end-time');
        if (!endTimeStr) return;
        const [endHour, endMinute] = endTimeStr.split(':').map(Number);
        const endTimeMinutes = endHour * 60 + endMinute;
        if (currentTimeMinutes > endTimeMinutes) {
          block.classList.remove('current', 'focus');
          block.classList.add('past');
          const courseBlockEl = block.querySelector('.course-block');
          if (courseBlockEl) {
            courseBlockEl.classList.remove('current', 'starting-soon');
            courseBlockEl.classList.add('past');
          }
        }
      });
    }

    function initializePage() {
      document.body.classList.add('loading');
      
      const todayButton = document.getElementById('todayViewButton');
      if (todayButton) {
        todayButton.style.display = 'none';
        todayButton.classList.remove('visible');
      }
      
      const loadingOverlay = document.getElementById('loadingOverlay');
      if (loadingOverlay) {
        loadingOverlay.style.display = 'flex';
      }

      fetchAllData().then(() => {
        window.addEventListener('resize', handleResize);
        handleResize();
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Observer pour le titre sticky
      const dayOfWeekElement = document.getElementById('dayOfWeek');
      const stickyDayNameElement = document.getElementById('stickyDayName');

      const observerOptions = {
        root: null,
        threshold: 0,
      };

      // Utiliser requestAnimationFrame pour optimiser les mises à jour visuelles
      const observer = new IntersectionObserver(function(entries) {
        requestAnimationFrame(() => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) {
              stickyDayNameElement.style.cssText = 'opacity: 1; transform: translateX(-50%) translateY(0);';
              stickyDayNameElement.classList.add('visible');
            } else {
              stickyDayNameElement.style.cssText = 'opacity: 0; transform: translateX(-50%) translateY(-100%);';
              stickyDayNameElement.classList.remove('visible');
            }
          });
        });
      }, observerOptions);

      observer.observe(dayOfWeekElement);
    });

    // Ajout d'un gestionnaire d'événements pour empêcher le défilement horizontal
    document.addEventListener('DOMContentLoaded', function() {
      // Empêcher le défilement horizontal
      window.addEventListener('scroll', function() {
        if (window.scrollX !== 0) {
          window.scrollTo(0, window.scrollY);
        }
      });

      // Empêcher le défilement horizontal lors du redimensionnement
      window.addEventListener('resize', function() {
        if (window.scrollX !== 0) {
          window.scrollTo(0, window.scrollY);
        }
      });
    });

    /* Daily → grille : conserver le jour affiché (seulement ce sens ; retour grille → daily sans ?date). */
    document.addEventListener('click', function(e) {
      var gridLink = e.target.closest && e.target.closest('.daily-grid-view-button a');
      if (!gridLink || !gridLink.getAttribute('href')) return;
      try {
        var ymdGrid = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
        e.preventDefault();
        window.location.href = './daily_grid.html?date=' + encodeURIComponent(ymdGrid);
      } catch (err) {}
    }, true);

    document.addEventListener('click', function(e) {
      var a = e.target.closest && e.target.closest('a[href*="prayer-times"]');
      if (!a || !a.getAttribute('href')) return;
      try {
        var ymdRet = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
        var ret = new URL(window.location.href);
        ret.searchParams.set('date', ymdRet);
        sessionStorage.setItem('planning_return_url', ret.toString());
        sessionStorage.setItem('planning_return_scroll', String(window.scrollY || window.pageYOffset || 0));
      } catch (err) {
        try {
          var ymdR2 = (typeof selectedDateYmd === 'string' && selectedDateYmd) ? selectedDateYmd : ymdFromDate(new Date());
          var page = (window.location.pathname && window.location.pathname.replace(/^.*\//, '')) || 'daily.html';
          sessionStorage.setItem('planning_return_url', page + '?date=' + encodeURIComponent(ymdR2));
          sessionStorage.setItem('planning_return_scroll', String(window.scrollY || window.pageYOffset || 0));
        } catch (e2) {}
      }
    }, true);

  </script>
